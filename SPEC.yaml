      symbol-name string inside the transpiled hexa_cc.c (codegen_c2 symbol map).
    compiler_tree_followup: |
      the compiler/ (ground-up native) tree emits bl _hexa_str_concat /
      call hexa_str_concat from compiler/codegen/{arm64_darwin,x86_64_linux,
      thumbv7em_eabihf}.hexa; this is verified at the .s-text level by
      tests/m0/concat_test.hexa. Linking a hexa runtime into compiler/main.hexa's
      ld step is a downstream codegen follow-up of commit 194d9011, gated behind
      the still-open compiler-driver gaps (driver aborts before codegen on real
