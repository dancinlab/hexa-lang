# ─────────────────────────────────────────────────────────────────────────────
# Fork storm prevention (Decision 2026-05-09)
# ─────────────────────────────────────────────────────────────────────────────
# A per-build "fork storm" occurs when build-hot hexa code calls exec()
# for trivial probes (date, uname, mkdir, test, rm). Inventory on
# 2026-05-09 found ~1403 exec() sites across compiler/, tool/, and tests/.
# The fix is a 4-level ladder: replace exec() with named intrinsics, then
# back the intrinsics with libc FFI, then with raw syscalls. See
# doc/fork_storm_inventory.md for the full call-site catalog and
# compiler/intrinsics/intrinsics.hexa for the v0 module.
fork_storm_prevention:
  decision_2026_05_09: ladder_L0_to_L3_intrinsics_first
  goal:
    forks_per_build_today:    "5–10"
    forks_per_build_target:   "≤2 (only `as` and `ld`)"
  ladder:
    L0:
      name: fork_storm
      meaning: "exec() scattered at every call site; 5–10 forks/build"
      status: current_baseline
    L1:
      name: intrinsic_surface
      meaning: "exec() centralized inside named intrinsic functions; bodies still fork once"
      status: shipping_2026_05_09
      module: compiler/intrinsics/intrinsics.hexa
      first_three:
        - now_ns
        - host_target
        - mkdir_p
      second_batch:
        - rm_rf
        - rm_file
        - getenv
        - path_exists
        - path_is_dir
      third_batch:
        - getcwd
        - cwd        # alias of getcwd, reads better at call sites
        - list_dir
    L2:
      name: libc_ffi
      meaning: "intrinsic bodies call libc directly via hexa C-FFI; no shell"
      status: deferred_pending_ffi_landing
    L3:
      name: raw_syscall
      meaning: "intrinsic bodies emit platform syscall trap inline; zero exec()"
      status: deferred_post_native_v1
  exec_call_inventory:
    snapshot_date: 2026-05-09
    total_call_sites: 1403
    files_touched: 265
    top_categories:
      - { name: date,   count: 160, intrinsic: now_ns_plus_format,      effort: S, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: clock_gettime_FFI, v2: linux_syscall_228 }
      - { name: rm,     count: 123, intrinsic: rm_rf_and_rm_file,       effort: M, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: opendir_readdir_unlink_FFI, v2: linux_unlink_87_rmdir_84 }
      - { name: echo,   count: 110, intrinsic: getenv,                  effort: S, status: PARTIALLY_ABSORBED, v0: shell_fork_with_name_validation, v1: libc_getenv, v2: extern_environ_walk }
      - { name: test,   count:  85, intrinsic: path_exists_path_is_dir, effort: S, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: libc_stat, v2: linux_access_21_stat_4 }
      - { name: uname,  count:  84, intrinsic: host_target,             effort: S, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: compile_time_constant, v2: na_already_constant }
      - { name: mkdir,  count:  78, intrinsic: mkdir_p,                 effort: S, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: libc_mkdir_walk, v2: linux_mkdir_83_mkdirat_258 }
      - { name: pwd,    count:  58, intrinsic: getcwd,                  effort: S, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: libc_getcwd, v2: linux_syscall_79 }
      - { name: ls,     count:  56, intrinsic: list_dir,                effort: M, status: PARTIALLY_ABSORBED, v0: shell_fork, v1: opendir_readdir_FFI, v2: linux_getdents64_217 }
      - { name: cd,     count:  45, intrinsic: call_site_rewrite,       effort: M, status: PENDING }
      - { name: git,    count:  38, intrinsic: keep_exec_v0,            effort: L, status: PENDING }
    absorbed_site_count_v0: 752  # 160+123+110+85+84+78+58+56 — categories with v0 intrinsic shipped
    pending_site_count:      83  # 45+38 (cd+git) — categories awaiting future batches

# ─────────────────────────────────────────────────────────────────────────────
# Stdlib evolution policy (Decision 2026-05-09)
# ─────────────────────────────────────────────────────────────────────────────
# stdlib modules version independently of the compiler. Each module owns
# its own backward-compat contract; additive helper APIs are accepted via
# small focused commits with a selftest delta and an .ai.md doc append.
# Major rewrites or breaking shape changes require an RFC.
#
# Documented patches in flight (2026-05-10) — orpheus key-recovery forge
# engine downstream consumers; FFI/HTTP enablers usable by any hexa-lang
# client (not orpheus-specific):
# ─────────────────────────────────────────────────────────────────────────────
# Stdlib core/alloc split + firmware tree (Decision 2026-05-10 — Option C)
# ─────────────────────────────────────────────────────────────────────────────
# Per audit doc/firmware_audit_2026_05_10.md, hexa-lang absorbs five firmware
# repos (hexa-rtsc/chip/cern/antimatter/space). Rather than mixing host and
# embedded code in a single stdlib (Option A) or fully separating into a
# firmware/ tree alone (Option B), Option C splits stdlib into:
#
#   stdlib/core/    — target-agnostic primitives (no alloc, no syscall)
#   stdlib/alloc/   — heap + arena allocators
#   stdlib/hal/     — hardware abstraction (target-gated impl)
#   stdlib/embedded/— bare-metal: panic, WFI, intr vectors
#   stdlib/mcu/     — MCU-specific helpers (cortex_m, riscv, avr, esp32)
#   stdlib/(host)   — current net/http/fs/process/json/... (host-only)
#
# firmware/ tree absorbs per-board code from existing hexa-* repos:
#   firmware/boards/{rtsc,chip,cern,antimatter,space}/
#   firmware/bsp/                 board-support packages
#   firmware/linker_scripts/*.ld  per-MCU memory layouts
firmware_evolution:
  decision_2026_05_10: option_C_core_alloc_split_plus_firmware_tree
  audit: doc/firmware_audit_2026_05_10.md
  absorption_targets:
    hexa-rtsc:        { phase: D+ verified, tests: 70/70 PASS, role: reference impl,    dest: firmware/boards/rtsc/,       status: applied, applied_in: F2, applied_date: "2026-05-10" }
    hexa-chip:        { phase: D iter 5,    role: stdlib/hal consumer,                  dest: firmware/boards/chip/,       status: applied, applied_in: F4, applied_date: "2026-05-10" }
    hexa-cern:        { phase: D2 to E,     role: Rust to hexa migrate during Phase E,  dest: firmware/boards/cern/,       status: applied, applied_in: F4, applied_date: "2026-05-10" }
    hexa-antimatter:  { phase: D workspace, role: multi-vendor,                         dest: firmware/boards/antimatter/, status: applied, applied_in: F4, applied_date: "2026-05-10" }
    hexa-space:       { phase: E hardware,  role: KiCad first deferred,                 dest: firmware/boards/space/,      status: applied, applied_in: F4, applied_date: "2026-05-10" }
  dependency_direction:
    allowed:
      - "firmware/* -> stdlib/core"
      - "firmware/* -> stdlib/alloc (with embedded allocator)"
      - "firmware/* -> stdlib/hal"
      - "firmware/* -> stdlib/mcu"
      - "firmware/* -> stdlib/embedded"
      - "compiler/* -> stdlib/core (cross-compile path)"
      - "compiler/* -> stdlib/alloc"
    forbidden:
      - "firmware/* -> stdlib/{net,http,fs,process,...} (host modules)"
      - "stdlib/* -> compiler/*"
  target_gate_check:
    rule: |
      Compiler rejects host-stdlib imports at compile time when
      --target=*-none-* is set. Detection by triple suffix.
  embedded_allocator:
    default: arena_v1                  # Decision 6 v1 arena-only
    optional: bump_allocator           # tight-RAM MCUs
    forbidden: tracing_gc              # Decision 6 permanent reject
  linker_scripts:
    location: firmware/linker_scripts/
    consumed_by: hexa_ld
    rfc: RFC-023 (planned — extension of RFC-018 §10)
  roadmap:
    F0: { status: done,          deliverable: SPEC decisions + firmware/ skeleton }
    F1:
      status: done
      applied_date: "2026-05-10"
      deliverable: stdlib/core/ + stdlib/alloc/ extraction (Option C split)
      audit: doc/stdlib_core_extraction_2026_05_10.md
      core_modules: [math, string, parse, bytes, math/float, math/permille, math/rng, hash/sha256, hash/xxhash]
      alloc_modules: [collections, path, json, json_object, argparse, math/eigen, math/rng_ctx]
      total_moved: 16
      shim_strategy: backward_compat_via_import_redirect
      sunset_target: after_F4_absorptions_complete
      target_gate_check_enforcement: deferred_to_F3
    F2:
      status: done
      applied_date: "2026-05-10"
      deliverable: firmware/boards/rtsc/ reference port
      mechanic: option_A_full_copy
      source: "~/core/hexa-rtsc"
      dest: "firmware/boards/rtsc/"
      files_moved: 112
      loc_moved: "~18k incl. README/CHANGELOG; firmware tree alone ~4k LOC"
      excluded: [".git/", "build/", "firmware/mcu/target/",
                 "firmware/state/markers/", "state/markers/", "state/*.log"]
      selftest_pre: "70/70 PASS upstream"
      selftest_post_absorb:
        sim: "4/4 (43 internal checks via hexa_interp)"
        lattice_check: "10/10"
        falsifier_check: "49/49"
        cross_doc_audit: "7/8 (pre-existing upstream — own_3 rogue-.hexa flag, NOT absorb regression)"
        hdl: "deferred (iverilog 12/12 upstream — toolchain gated)"
        mcu: "deferred (cargo 15/15 upstream — toolchain gated)"
      license_preserved: true
      citation_preserved: true
      absorb_date: "2026-05-10"
    F3:
      status: done
      applied_date: "2026-05-10"
      deliverable: "thumbv7em-none-eabihf target in compiler/codegen + target_gate_check enforcement (HX1110)"
      codegen: compiler/codegen/thumbv7em_eabihf.hexa
      gate_check: compiler/check/target_gate.hexa
      diagnostic: "HX1110 (host-stdlib import in embedded target)"
      tests:
        zero_path: tests/firmware/zero_test.hexa            # asm-only success path
        gate_check: tests/firmware/blink_test.hexa          # HX1110 enforcement
      opcodes_v1: [mov, add, sub, mul, sdiv, udiv, and, orr, eor, ldr, str, push, pop, b, bl, cbz, cmp, it]
