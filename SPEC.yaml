# ─────────────────────────────────────────────────────────────────────────────
# Stdlib evolution policy (Decision 2026-05-09)
# ─────────────────────────────────────────────────────────────────────────────
stdlib_evolution:
  decision_2026_05_09: separate_per_module_versioning
  rationale: |
    The compiler binary versions on the bootstrap stage cycle (stage0 →
    stage3 fixed-point). stdlib helpers evolve faster — each module gets
    its own SemVer-light track. Additive helpers land via small commits;
    breaking shape changes go through an RFC.
  policy:
    - additive helpers       — small focused commit, +N selftest, .ai.md append
    - breaking shape change  — requires RFC
    - new module             — requires RFC + module .ai.md skeleton
    - dependency direction   — stdlib MAY depend on stdlib; compiler/ MAY
                               depend on stdlib; stdlib MUST NOT depend on
                               compiler/ (avoids bootstrap cycle)
  modules_in_flight:
    c_ffi:
      file: stdlib/c_ffi.hexa
      planned_version: v1.1
      applied_version: v1.1
      applied_date: "2026-05-09"
      applied_commit: ecc49e1e
      planned_additions:
        - { name: c_alloc_ptr_slot, signature: "() -> int",            purpose: "heap-allocate one void* slot, return address" }
        - { name: c_load_ptr,       signature: "(slot: int) -> int",   purpose: "read stored void* at slot, return pointer-sized int" }
      use_case_primary: |
        Out-pointer C APIs like duckdb_open_ext(path, &db_handle, ...).
        Without an out-pointer slot, hexa cannot pass a writable address
        to C; subprocess fallback adds 100ms+ per call.
      compat: backward 100% (additive helpers, no signature changes)
      downstream_consumers:
        - orpheus recovery/module/duckdb_native.hexa (commit ffb184b)
          — subprocess 136ms → FFI 1-3ms (17-50× speedup)
      forge_engine_link: forge.cond.NATIVE_DUCKDB
    http:
      file: stdlib/http.hexa
      current_version: v1.0.0 (14 http_* GET symbols)
      planned_version: v1.1
      planned_additions:
        - { name: http_post_with_headers, signature: "(url: str, headers: [str], body: str, timeout_s: int) -> Response", purpose: "POST + JSON body — JSON-RPC enabler" }
      implementation_path:
        v0_path_c: curl_shellout    # mirrors existing http_get_with_headers
        v1_path_b: libcurl_C_FFI    # depends on c_ffi v1.1 helpers (separate concern)
        v2_path_a: native_http_emit # syscall + tls_handshake; defer
      use_case_primary: |
        bitcoind RPC (localhost:8332): subprocess bitcoin-cli 15-30ms vs
        persistent connection 3-7ms (5-10× speedup). Generic JSON-RPC
        clients benefit symmetrically.
      compat: backward 100% (additive POST API; GET unchanged)
      downstream_consumers:
        - orpheus recovery/module/method_bitcoin_core_rpc.hexa
      forge_engine_link: forge.cond.NATIVE_BTC_RPC
    http_sse:
      file: stdlib/http_sse.hexa
      current_version: v1.0.0 (GET streaming surface)
      applied_version: v1.1
      applied_date: "2026-05-11"
      applied_commit: faca4134
      applied_additions:
        - { name: http_sse_post,                    purpose: "streaming POST + body (Anthropic Messages, OpenAI Chat Completions)" }
        - { name: http_sse_open_post,               purpose: "POST variant of http_sse_open" }
        - { name: http_sse_open_method,             purpose: "method-parametric open (GET/POST/...)" }
        - { name: http_sse_build_curl_method_cmd,   purpose: "internal _sse_build_curl factored into _method variant" }
      use_case_primary: |
        wilson provider-anthropic streaming POST. GET surface byte-identical.
        Body routed via `printf %s '...' | curl --data-binary @-`.
        Interp-mode POST fallback deferred — AOT users get streaming POST today.
      compat: backward 100% (additive POST API; GET surface byte-identical)
      downstream_consumers:
        - wilson provider-anthropic (Messages API streaming)
        - any OpenAI Chat Completions streaming client
    semver:
      file: stdlib/semver.hexa
      applied_version: v1.0.0
      applied_date: "2026-05-11"
      applied_commit: 4725c619
      applied_additions:
        - { name: semver_parse,            purpose: "parse a SemVer 2.0.0 string (major.minor.patch[-prerelease][+build])" }
        - { name: semver_compare,          purpose: "precedence compare two versions (prerelease < release; build ignored)" }
        - { name: semver_satisfies,        purpose: "range-satisfies — ^, ~, >=, <=, >, <, =, x-ranges, hyphen ranges" }
      use_case_primary: |
        wilson loader_validate — validate plugin / dependency version
        constraints against installed versions. SemVer 2.0.0 conformant.
      compat: new module (v1.0.0)
      downstream_consumers:
        - wilson loader_validate (plugin version-constraint checks)
      selftest: test_semver 110/110
  inbox_protocol:
    decision_2026_05_09: incoming_dir_until_native_compiler_v1
    directory: incoming/
    manifest: incoming/PATCHES.yaml
    audit_log: incoming/manifest_log.jsonl
    sync_tool: tool/inbox_sync.hexa
    promote_tool: tool/inbox_promote.hexa
    sunset_trigger: stage_3_fixed_point
    bedrock_advisory: doc/inbox_for_bedrock.md
    rationale: |
      Until the new native compiler reaches stage 3 byte-equal fixed
      point, two trees (self/ and compiler/) coexist and stdlib
      patches may need verification across both. The inbox is a
      temporary staging area; once native compiler is self-hosting,
      patches flow through normal PR workflow.
  selftest_invariant: |
    Every additive helper bumps the per-module selftest count and
    keeps overall stdlib selftest exit 0. Example: c_ffi 35 → 36;
    http 14 → 15.
  doc_invariant: |
    Each helper appends a signature + use-case block to the module's
    .ai.md (e.g., stdlib/c_ffi.ai.md, stdlib/http.ai.md).

