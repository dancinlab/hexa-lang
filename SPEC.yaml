# SPEC.yaml — hexa-lang authoritative decision record (SSOT)
#
# This file is the single source of truth for hexa-lang language/toolchain
# decisions. SPEC.md is auto-generated from this file via tool/render_spec.hexa.
#
# Schema version is incremented on breaking shape changes only.

schema_version: 1
title: hexa-lang specification
status: directional (decisions locked; P0 stage-1 source-side OOM closed at current scale — A1+A2 → peak ~782 MB verified; deployed `hexa_real` current at HEAD `dae438ee`)
last_updated: 2026-05-11
authoritative_rfcs:
  - proposals/rfc_017_atlas_n6_embedding_and_strict_lint.md
  - proposals/rfc_018_native_codegen_spec.md
  - proposals/rfc_019_error_diagnostics_spec.md
  - proposals/rfc_020_enum_payload_variants.md
  - proposals/rfc_021_daemon_mode.md
  - proposals/rfc_022_async_model.md
  - proposals/rfc_023_firmware_linker_spec.md

# ─────────────────────────────────────────────────────────────────────────────
# Tree layout (what trees exist and what each is for)
# ─────────────────────────────────────────────────────────────────────────────
tree_layout:
  decision_2026_05_09: keep_compiler_tree_alongside_self
  rationale: |
    self/ is the existing self-host upstream (parser/typechecker/IR in hexa,
    transpiled to self/native/hexa_cc.c). compiler/ is the new ground-up
    native compiler per RFC-018 (5-stage IR, atlas static embed, direct
    codegen). Both trees coexist; compiler/ migrates patterns from self/
    and shares language upstream features (e.g., enum payloads via RFC-020).
  trees:
    self_:
      role: existing self-host upstream
      contents:
        - self/main.hexa            # `hexa` CLI entry
        - self/lexer.hexa
        - self/parser.hexa
        - self/type_checker.hexa
        - self/ir/                  # self-host IR (instr/types/builder/lowering)
        - self/native/hexa_cc.c     # transpiled C compiler (~20k lines)
      regenerate_via: hexa cc --regen
    compiler_:
      role: new ground-up native compiler (RFC-018)
      contents:
        - compiler/main.hexa
        - compiler/lex/tokens.hexa
        - compiler/parse/ast.hexa
        - compiler/ir/hir.hexa
        - compiler/ir/mir.hexa
        - compiler/ir/lir.hexa
        - compiler/diag/catalog.hexa
      status: phase A0 skeleton

# ─────────────────────────────────────────────────────────────────────────────
# Language features — enum / sum types (Decision 2026-05-09)
# ─────────────────────────────────────────────────────────────────────────────
language_features:
  enum_first_principle:
    decision: enum_100_percent_first
    rationale: |
      Wherever payload-free enums (Rust unit-style) suffice, prefer them over
      string discriminators. Improves type safety, compile-time exhaustiveness,
      and parity with self/ir/instr.hexa's CmpKind pattern.
    applies_to:
      - compiler/lex/tokens.hexa::TokenKind
      - compiler/parse/ast.hexa::ItemKind, ExprKind
      - compiler/diag/catalog.hexa::Severity, FixItKind
    exempted:
      - structures whose variants need data payloads — until RFC-020 lands
        and is verified end-to-end (parser→typechecker→codegen)
  hexa_lang_upstream_first:
    decision: fix_at_upstream_not_workaround
    rationale: |
      When a language gap is hit (e.g., enum payload codegen), fix it in
      hexa-lang upstream (self/ + self/native/hexa_cc.c) rather than working
      around in downstream tools. Maintains language-level uniformity.
    examples:
      - RFC-020 — enum payload variant support
  enum_payload_status:
    summary: partial_working_needs_completion
    confirmed_working:
      - "'enum Shape { Circle(Int), Rect(Int), Unit }' parser declaration"
      - "'match s { Shape::Circle(r) -> ... }' pattern binding (interpreter mode)"
      - "7 match patterns: wildcard, literal, binding, variant, struct, tuple, guard"
    confirmed_missing:
      - "'E::Variant(x)' construction syntax (parse_primary line 3016)"
      - "typechecker variant payload type registry"
      - "typechecker pattern binding — variable scope introduction"
      - "hexa_cc.c struct/union codegen + payload extraction"
      - "multi-field variants entirely"
    target_design: single_field_payload_plus_struct_embed
    rfc: RFC-020
    multi_field_status: deferred_to_later_rfc

# ─────────────────────────────────────────────────────────────────────────────
# Foundational decisions (from RFC-017/018)
# ─────────────────────────────────────────────────────────────────────────────
foundation:
  language_kind:
    decision: native_compiled
    rationale: |
      hexa-lang transitions from interpreter (hexa_interp) to a native compiler.
      Interpreter remains only as bootstrap stage0.
    rejected:
      - interpreter_only           # too slow for CI/LSP at atlas size 4.2 MB
      - interpreter_with_cache     # still per-process overhead, not zero
    references: [RFC-017]

  atlas_embedding:
    decision: static_baked_into_compiler
    rationale: |
      atlas.n6 + atlas.append.*.n6 are merged at compiler build time and
      embedded as a packed const into the compiler binary (rodata section).
      Hash pinned via ATLAS_HASH constant.
    properties:
      runtime_cost_ms: 0
      compiler_binary_overhead_mb: 1_to_2
      drift_handling: ci_auto_rebuild_compiler
      override: hexa.toml [atlas] path = "..." (rebuilds compiler)
    rejected:
      - read_atlas_at_runtime      # 200ms per invocation on 4.2 MB atlas
      - mtime_disk_cache           # acceptable but inferior to static
    references: [RFC-017 §4.5]

  execution_blocking_lint:
    decision: strict_compile_time_fatal
    rationale: |
      Python SyntaxError + TypeScript strict model. No binary is produced when
      any S0–S5 or S8 check fails. S6/S7 only fatal when annotated.
    stages:
      S0_parse:        { fatal: true,  description: "syntax / lex" }
      S1_resolve:      { fatal: true,  description: "atlas P/C/L/E node existence" }
      S2_bind:         { fatal: true,  description: "scope / variable binding" }
      S3_type:         { fatal: true,  description: "nominal types, generics" }
      S4_domain:       { fatal: true,  description: "ℝ/ℕ/ℤ/ℂ domain consistency" }
      S5_units:        { fatal: true,  description: "dimensional analysis" }
      S6_equational:   { fatal: opt_in_via_at_verify, description: "LHS=RHS canonical, sample counter-example" }
      S7_proof:        { fatal: opt_in_via_at_prove,  description: "self-prover only (no Z3)" }
      S8_citation:     { fatal: true,  description: "atlas L[*] citation present where required" }
    references: [RFC-017 §3.1]

  codegen_strategy:
    decision: direct_codegen
    rationale: |
      No LLVM, no C-transpile. Direct source → mach pipeline keeps every IR
      stage atlas-aware and removes external toolchain dependencies.
    pipeline:
      - lex
      - parse
      - resolve     # S0–S2
      - check       # S3–S5, S8
      - lower       # AST → HIR
      - mono        # generic monomorphization
      - ssa         # MIR (CFG, SSA)
      - optimize    # const-fold, dce, conservative inline
      - regalloc    # LIR (target-specific)
      - emit        # asm or machine code
      - link        # ELF / Mach-O
    references: [RFC-018]

# ─────────────────────────────────────────────────────────────────────────────
# Targets (Decision 1)
# ─────────────────────────────────────────────────────────────────────────────
targets:
  decision: parallel_dual
  rationale: User runs both Apple Silicon and Linux; both must work from day one.
  tier_0_concurrent:
    - triple: arm64-apple-darwin
      role: primary dev environment
    - triple: x86_64-linux-gnu
      role: CI / docker / runners
  tier_1_followup:
    - triple: arm64-linux-gnu                       # ARM containers
    - triple: thumbv7em-none-eabihf                 # Cortex-M4F (firmware: hexa-rtsc, hexa-chip)
    - triple: riscv32imac-unknown-none-elf          # RISC-V 32-bit (firmware)
  tier_2_later:
    - triple: wasm32-unknown-unknown
    - triple: riscv64-linux-gnu
    - triple: thumbv6m-none-eabi                    # Cortex-M0/M0+
    - triple: thumbv7m-none-eabi                    # Cortex-M3
    - triple: xtensa-esp32-none-elf                 # ESP32 (firmware: hexa-antimatter)

# ─────────────────────────────────────────────────────────────────────────────
# macOS Mach-O gate (Decision 2026-05-09; warn-only Phase B)
# ─────────────────────────────────────────────────────────────────────────────
macos_machO_gate:
  decision_2026_05_09: warn_only_phase_B
  phases:
    A_in_repo:        landed
    B_user_wrapper:   user_session    # $HOME/.hx/bin/hexa edit, separate
    C_strict_block:   deferred        # awaits hook-layer migration
  reference_wrapper:  tool/wrappers/hexa_top_wrapper.sh
  lint_rule:          tool/lint_macho_gate.hexa                   # LINT-MACHO-1 (.hexa exec sites)
  invocation_lint:    tool/lint_macho_gate_invocations.hexa       # LINT-MACHO-2 (sh + CI surface)
  declarative_spec:   spec/hexa_macho_gate.spec.yaml              # falsifier SSOT (F-HEXA-MACHO-1/2)
  lint_bypass_env:    HEXA_LINT_MACHO_DISABLE=1                   # per-session escape hatch (Phase A)
  warning_template: |
    ai-native: hexa invocation without --Mach-O on macOS.
      This call uses the stage0 interpreter; no native Mach-O codegen
      is produced. Use --Mach-O ONLY when you genuinely need a native
      arm64 binary (e.g. `hexa build --emit=exec` for a release).
      For hooks, probes, lints, and most dev work this warning is
      informational — no action required.
      Set HEXA_TARGET_MACHO=1 in your shell to silence per-session.
  silenced_by:
    - cli_flag: --Mach-O
    - env_var: HEXA_TARGET_MACHO=1
  rationale: |
    94% of macOS hexa_interp.real.real invocations don't need native
    Mach-O codegen (hooks/handlers/probes). The flag makes the
    intent explicit; downstream tooling can route accordingly.
    block-0 in Phase B avoids breaking claude-bind hooks; Phase C
    strict mode follows hook-layer migration.

# ─────────────────────────────────────────────────────────────────────────────
# Bootstrap (Decision 2)
# ─────────────────────────────────────────────────────────────────────────────
bootstrap:
  stage0:
    decision: existing_hexa_interp
    rationale: |
      Existing build/hexa_interp.* interpreter executes hexa-written native
      compiler source to produce stage1. Zero new external dependencies.
    accepts_temporary_external: system_as_and_ld_during_stage0_to_stage1_only
  stages:
    stage_0: { tool: hexa_interp, output: "stage1 native compiler binary" }
    stage_1: { tool: stage_0,     output: "stage2 compiler (self-compiled by stage1)" }
    stage_2: { tool: stage_1,     output: "stage3 compiler" }
    stage_3: { tool: stage_2,     fixed_point: "byte-equal to stage2" }
  retire_interpreter_after: stage3_settled
  # Witness paths for stage 2 self-compile + stage 3 fixed-point harness.
  # Both harnesses exit 0 (DEFERRED) when their inputs are missing so CI
  # does not block while A2 (stage 1 binary) is in flight. See
  # doc/bootstrap_stage_2_3.md for the full failure-mode triage list.
  witness_paths:
    stage_2_smoke:        tests/bootstrap/stage_2_smoke.hexa
    stage_3_fixed_point:  tests/bootstrap/stage_3_fixed_point.hexa
    driver:               tests/bootstrap/run_bootstrap.sh
    doc:                  doc/bootstrap_stage_2_3.md
    expected_artifacts:
      stage_2_binary:     /tmp/hexa_stage_2
      stage_3_binary:     /tmp/hexa_stage_3
      m0_asm_emitted:     /tmp/m0_s2.s

  # Interpret-mode after stage3 (Decision 2026-05-09 — D+B)
  #
  # User wants `hexa run` to keep working as an interpret-style entrypoint
  # after the standalone interpreter is retired. Two paths chosen:
  #
  #   D (default)  `hexa run x.hexa` ≡ build + exec(out_path).
  #                Zero extra LOC — driver already calls system as/ld and
  #                the resulting binary. atlas static-embed makes the cold
  #                path acceptable.
  #
  #   B (opt-in)   --interp / `hexa repl`. AST evaluator at
  #                compiler/eval/ast_eval.hexa walks the typed AST after
  #                lex/parse/check. Reuses the entire frontend; only adds
  #                ~200-500 LOC for the per-ExprKind evaluate switch.
  #                Used for fast startup, REPL, debugging, hot-edit cycles.
  #
  # Rejected:
  #   A — keep a separate ~20k-LOC interpreter alongside the native
  #       compiler. Two code bases, no.
  #   C — JIT (in-memory mmap + emit + jump). Deferred; nice-to-have but
  #       per-platform complexity (page rwx, codesign on macOS).
  #
  # No tracing GC interpreter, no separate parser. Both paths share the
  # compiler/lex + compiler/parse + compiler/check infrastructure.
  interpret_mode_post_retirement:
    decision: D_plus_B_combined
    primary: build_and_exec    # `hexa run x.hexa` ≡ build + system exec
    optional: ast_evaluator    # `--interp` / `hexa repl` via compiler/eval/
    rejected: [keep_separate_interpreter, jit_first]
    notes: |
      ast_evaluator is implemented post-stage3 inside compiler/eval/ —
      not a fork of self/ tree, but a thin walker over compiler/parse +
      compiler/check output.

# ─────────────────────────────────────────────────────────────────────────────
# Language for diagnostics (Decision 3)
# ─────────────────────────────────────────────────────────────────────────────
diagnostics_language:
  decision: english_only
  rationale: |
    User explicitly fixed ENGLISH ONLY. Korean i18n option closed permanently.
    Catalog message keys, templates, explain output all English.
  no_i18n: true
  applies_to:
    - compiler diagnostics
    - hexa explain output
    - error catalog templates
    - stdlib documentation
  excludes:
    - design RFCs and meta documents (may remain in author's preferred language)

# ─────────────────────────────────────────────────────────────────────────────
# Opt-out grace label (Decision 4)
# ─────────────────────────────────────────────────────────────────────────────
opt_out:
  decision: at_grace_annotation_only
  syntax: '@grace(HXCODE, until="YYYY-MM-DD", reason="...")'
  required_fields: [error_code, until, reason]
  forbidden:
    - cli_flag_to_disable_strict     # --unsafe etc. rejected
    - environment_variable_override  # HEXA_STRICT=0 rejected
  scope_rule: applies_to_immediately_following_item_only
  expiry_behavior: |
    On `until` date pass, compiler emits HX9001 and refuses to build until
    @grace is removed (item fixed) or `until` extended (which is itself a
    deliberate decision visible in PR review).

  # AI-native warn + explicit user consent (Decision 2026-05-09)
  #
  # @grace is allowed but NEVER silent. Every @grace site emits an
  # AI-native HX9000 warning at compile time, and the build is gated
  # on explicit user consent — a CI/PR-level acknowledgement signal.
  # Compilers/linters that swallow the warning silently are non-conformant.
  ai_native_warn_policy:
    diagnostic: HX9000
    severity: Warning
    language: english     # Decision 3 — ENGLISH ONLY
    message_template: |
      ai-native: @grace at {file}:{line} suppresses {error_code} until
      {until}. Reason: "{reason}".

      Suppressed diagnostic ({error_code} — {suppressed_title}):
        {suppressed_message}
        ({suppressed_severity_original}; downgraded by @grace until {until}.)

      This is a TEMPORARY debt — the author is responsible for resolving
      the underlying issue before the expiry date. Reviewer acknowledgement
      REQUIRED before merge.
    style: ai_native    # short, specific, actionable; not generic warn

    # Decision 2026-05-09 (refinement): HX9000 must include the FULL rendered
    # message of the diagnostic it suppresses, not just the HX code. This
    # gives reviewers (and AI assistants reading the output) immediate
    # visibility into WHAT is being silenced — not just that something is.
    #
    # The check pass that detects a @grace site:
    #   1. Constructs the diagnostic it would normally emit (real path)
    #   2. Renders it via render_short / render_pretty
    #   3. Stuffs the rendered text into HX9000.args.suppressed_message
    #   4. Passes the original DiagSpec.title and DiagSpec.severity in
    #      args.suppressed_title / args.suppressed_severity_original
    #   5. Does NOT emit the original diagnostic (suppression intact)
    #   6. Emits HX9000 alone with the suppressed-detail block populated
    #
    # If the suppressed diagnostic would have produced did-you-mean or
    # fix-it info, those fields are inlined into suppressed_message too —
    # the reviewer should see the full picture.
    suppressed_diagnostic_inlining:
      args_keys: [suppressed_title, suppressed_message, suppressed_severity_original]
      render_format: short      # multi-line pretty would clobber HX9000 layout
      include_did_you_mean: true
      include_fix_it: true
      rationale: |
        AI assistants and human reviewers should not have to guess what
        @grace is hiding. Inlining the full original message at the
        suppression site means a single HX9000 diagnostic carries
        everything needed to evaluate whether the bypass is reasonable.

    user_consent_mechanism:
      pr_trailer: 'Acked-grace: HXxxxx by <reviewer-handle>'
      commit_trailer: 'acked-grace: <code> by <author-handle>'
      ci_check: |
        CI fails when a commit/PR introduces or modifies a @grace site
        and no Acked-grace trailer matches the affected HX code(s).
        Per-site granularity. Covers both new and prior @grace lines.
    rationale: |
      User decision: bypassing strict checks must require an explicit
      human signoff trail. Silent @grace defeats the strict-lint model.
      The HX9000 warning ensures the bypass is visible at every
      compile, the consent mechanism ensures it is visible at every
      review.

# ─────────────────────────────────────────────────────────────────────────────
# Atlas citation strict (Decision 2026-05-09)
# ─────────────────────────────────────────────────────────────────────────────
# User decision: "공식 없으면 거절" — formula-bearing functions must be
# bound to atlas L[*] node, otherwise compile fails. Two legal binding
# paths; otherwise @grace must be used to opt out per-site.
atlas_citation_strict:
  decision: formula_must_cite_atlas_L
  rationale: |
    A function carrying a formula annotation (@verify or @law, OR a body
    that references atlas L[*] nodes) is a knowledge-bearing artifact.
    The atlas is the single source of truth for theorems / laws; allowing
    formula code to drift unbound from atlas defeats the SSOT. RFC-017
    §3.1 S8 already lists citation as fatal "where required"; this
    decision pins WHERE.

  required_when:
    - item has '@verify' annotation        # caller declared it a theorem
    - item has '@law(...)' annotation      # explicit formula docstring
    - item body references any L[*] node   # implicit formula use

  legal_bindings:
    - syntax: '@implements(L[<existing-id>])'
      meaning: cite an already-registered atlas L node
    - syntax: '@discover(kind="L")'
      meaning: register THIS function as a NEW atlas L node
                (RFC-017 §5 ε self-proof; routes through compiler/discover/
                staging path on prover pass)

  on_missing_binding:
    diagnostic: HX8004
    severity: Error
    template: |
      formula in `{name}` has no atlas binding — add @implements(L[id]) to
      cite an existing law, or @discover(kind="L") to register this
      function as a new one. SPEC.yaml atlas_citation_strict.

  bypass_path:
    via: '@grace(HX8004, until="YYYY-MM-DD", reason="...")'
    notes: |
      Standard @grace machinery (Decision 4) covers HX8004 like any other
      HX code. Use ONLY when atlas drift / migration is in flight; the
      until date forces the binding to land before merge.

      EVERY @grace site emits HX9000 ai-native warning — see
      opt_out.ai_native_warn_policy. Bypass is never silent.

  promotion_from_HX8003:
    note: |
      The earlier HX8003 (Warning — "fn uses L refs but no @implements")
      is superseded by HX8004 (Error). HX8003 demoted or retired in the
      next citation pass refresh. Tooling should treat both equivalently
      during transition.

# ─────────────────────────────────────────────────────────────────────────────
# Atlas self-discovery system (Decision 5: ε)
# ─────────────────────────────────────────────────────────────────────────────
atlas_self_discovery:
  decision: epsilon_self_proof
  rationale: |
    Verified hexa code automatically registers as atlas L[*] (theorem) nodes.
    Atlas becomes a living theorem library that grows as the codebase grows.

  prover_engine:
    decision: in_house_prover_only         # Sub 5a
    rationale: User mandate — zero external dependency, no Z3/CVC5.
    initial_capabilities:
      - equational_rewrite
      - constant_folding
      - sample_eval_counter_example
      - unit_propagation
      - atlas_graph_consistency
    deferred_capabilities:
      - linear_arithmetic
      - non_linear_arithmetic
      - quantifiers
      - real_number_induction

  registration_authority:
    decision: fully_automatic              # Sub 5b
    rationale: User chose auto-register on prover pass; safety net is sub 5e.
    safeguards_baked_in:
      - record_verifier_version
      - record_proof_hash
      - retroactive_revalidation_on_prover_upgrade
    staging_pipeline:
      subtree: compiler/discover/          # discover.hexa + staging.hexa + promote.hexa
      step1_writer: write_staging          # emits atlas.proposed.{date}.n6
      step2_promoter: promote_to_atlas     # ACTIVE — folds proposed → live atlas
      step2_module: compiler/discover/promote.hexa
      manifest_path_convention: /tmp/_promote_manifest.{date}.txt   # date = UTC YYYY-MM-DD
      conflict_rules_applied:
        - fingerprint_dedup_merges_as_alias        # sub 5d
        - id_first_wins_rejects_with_warning       # sub 5d
        - new_emits_full_proof_hash_record         # sub 5d
      rationale: |
        Step 1 of ε self-proof writes verified discoveries to a staging
        atlas.proposed.{date}.n6 file. Step 2 (promote_to_atlas) is now
        ACTIVE: invoked explicitly as a CLI/tool, it loads the live atlas
        index, applies decision 5d conflict resolution per proposal, and
        emits a fresh atlas.append.{today}.n6 shard plus a manifest at
        /tmp/_promote_manifest.{date}.txt summarising counts (seen /
        promoted_new / merged_alias / rejected_collision) and per-proposal
        dispositions. The retroactive sweep (sub 5e — tombstone integration
        on prover upgrade) remains deferred.

  verification_timing:
    decision: every_compile_every_function # Sub 5c
    rationale: User chose maximum coverage; performance handled by caching.
    mandatory_optimizations:
      - hash_keyed_skip_for_unchanged_functions
      - early_reject_for_non_theorem_shapes  # side-effect, IO, mutation
    cost_model: prover_runs_for_every_function_in_every_compile

  conflict_resolution:
    decision: fingerprint_dedup_plus_id_first_wins   # Sub 5d
    rules:
      same_canonical_form: register_under_existing_L_with_alias
      same_explicit_id_different_meaning: first_wins_with_warning
      anonymous_auto_id: derived_from_fingerprint_so_collision_implies_dedup

  invalidation:
    decision: tombstone_plus_retroactive_sweep        # Sub 5e
    mechanism:
      manual_tombstone: "hexa atlas tombstone L[id] --reason=\"...\""
      automatic_sweep: |
        On prover version upgrade, CI nightly job re-verifies every registered
        L node. Failing nodes are auto-tombstoned with PR open for human review.
        Implementation: compiler/discover/retroactive_sweep.hexa.
      dependency_tracking: |
        Status: cascade_tombstones lands.
        Implementation: compiler/discover/cascade.hexa.
        proof-hash records lemmas used. When a lemma is tombstoned (manual or
        sweep), dependent L nodes auto re-verify; failures cascade-tombstone
        with reason "cascade-tombstone: depends on L[<root>] which was
        tombstoned". v1 detection is heuristic substring match in
        normalized_form; semantic dependency analysis (parse the S-expr and
        walk referenced lemma symbols + transitive closure) is v1.1 work.
      auto_pr_helper: |
        tool/auto_pr_tombstone_sweep.hexa — when retroactive_sweep +
        cascade_tombstones together newly tombstone >0 L nodes, this helper
        renders a PR body summarizing the prover version transition, counts,
        and per-tombstone disposition, then invokes `gh pr create`. On any
        failure (gh missing, no auth, no commits) it falls back to writing
        /tmp/_tombstone_sweep_pr_body.{date}.txt and printing the suggested
        command. Returns 0 always (CI infra resilience). Smoke tests should
        export HEXA_AUTO_PR_DRY_RUN=1 (or call auto_pr_dry_run directly) to
        skip the git/gh side-effects.
    citing_tombstoned_l_emits: HX1099_compile_fail
    history_kept_in: atlas.tombstones.n6

# ─────────────────────────────────────────────────────────────────────────────
# Memory model (Decision 6)
# ─────────────────────────────────────────────────────────────────────────────
memory_model:
  decision: arena_v1_borrow_check_v2
  current_phase: v1_arena_only
  rationale: |
    1.x sticks to arena/region allocation — short-lived processes (compiler,
    verification, tools) cover 99% of cases. 2.x adds borrow check for
    long-lived objects without breaking arena code.
  v1_design:
    primary: function_local_arena
    secondary: request_scoped_arena_for_long_running   # LSP, daemon
    static: compile_time_const_in_rodata               # atlas
    user_heap: arena_only_no_manual                    # 1.x explicitly forbids manual free
  v2_design:
    add: borrow_checker_with_explicit_arena_lifetime_handles
    add: limited_manual_escape_hatch_for_systems_code
    keep: gc_will_never_be_added                        # rejected permanently
  rejected:
    - tracing_gc          # runtime weight, pause times, dependency surface
    - ref_counting        # cycle handling burden, atomic costs

# ─────────────────────────────────────────────────────────────────────────────
# Linker (Decision 7)
# ─────────────────────────────────────────────────────────────────────────────
linker:
  decision: hexa_ld_primary_with_system_fallback
  primary: hexa_ld
  fallback: system_ld_or_lld
  fallback_triggers:
    - hexa_ld_binary_missing
    - hexa_ld_runtime_failure
    - explicit_flag: "--linker=system"
  hexa_ld_v1_scope:
    # NOTE (2026-05-09): v1.1 adds Mach-O arm64 emitter alongside ELF.
    # NOTE (2026-05-10): v1.2 embeds ad-hoc LC_CODE_SIGNATURE so the
    # kernel accepts the binary on Apple Silicon without any external
    # `codesign` shellout. ad-hoc only — no notarization, no team-id.
    # See compiler/link/hexa_ld.hexa: link() autodetects ELF (0x7F ELF)
    # vs Mach-O 64 (CF FA ED FE) magic and dispatches accordingly.
    formats: [ELF, Mach-O_arm64]      # v1 → ELF; v1.1 → ELF + Mach-O_arm64
    capabilities:
      - static_linking_only
      - symbol_resolution             # ELF: `_start`/`main`; Mach-O: `_main`/`start`
      - basic_relocations             # v1.1: NONE only — full reloc → v1.3
      - dwarf_debug_section_emit_basic # v1.1: dropped — lands v1.3
      - macho_arm64_execute           # v1.1: MH_EXECUTE + LC_MAIN + LC_LOAD_DYLINKER
      - codesign_embedded             # v1.2: ad-hoc LC_CODE_SIGNATURE
                                      #   (CSMAGIC_EMBEDDED_SIGNATURE wrapping
                                      #    CSMAGIC_CODEDIRECTORY with
                                      #    SHA-256 per-4 KiB-page hashes;
                                      #    no notarization, no team-id)
    deferred:
      - dynamic_linking               # LC_LOAD_DYLIB / PT_DYNAMIC → v1.3+
      - link_time_optimization
      - section_dead_code_elim
      - relocation_processing_full    # v1.3
      - codesign_notarized            # v1.4+: requires Apple Developer ID
                                      #   + altool roundtrip; out of scope
  bootstrap_carve_out:
    rule: system_ld_temporarily_permitted_during_stage0_to_stage1
    expires_after: stage1_native_compiler_settled

# ─────────────────────────────────────────────────────────────────────────────
# Migration policy (Decision 8)
# ─────────────────────────────────────────────────────────────────────────────
migration:
  decision: big_bang
  rationale: |
    User chose to fix all violations in a coordinated PR series and enable
    strict checks at once, rather than phased grace-based rollout.
  procedure:
    - stage1_native_compiler_settled_first
    - run_full_tree_lint_dump_on_existing_hexa_files
    - coordinated_pr_series_to_fix_all_violations
    - flip_strict_globally_in_one_commit
  fallback_for_unfixable:
    rule: explicit_at_grace_annotation_per_site
    note: |
      If a violation cannot be fixed in the migration window, an EXPLICIT
      @grace label must be added by the author with reason and until — not
      auto-generated by tooling.

# ─────────────────────────────────────────────────────────────────────────────
# Diagnostic system (RFC-019, English-only adjusted)
# ─────────────────────────────────────────────────────────────────────────────
diagnostics:
  code_format: 'HX[CCCC]'
  groups:
    HX0xxx: parse_lex                # S0
    HX1xxx: atlas_resolve            # S1
    HX2xxx: bind_scope               # S2
    HX3xxx: type                     # S3
    HX4xxx: domain                   # S4
    HX5xxx: units                    # S5
    HX6xxx: equational               # S6
    HX7xxx: proof                    # S7
    HX8xxx: citation                 # S8
    HX9xxx: codegen_link_runtime     # RFC-018
  catalog_location: stdlib/diagnostics/catalog.hexa
  message_templates: stdlib/diagnostics/messages.hexa  # English
  output_modes: [pretty, short, json, github]
  features:
    - error_code
    - precise_span
    - did_you_mean   # Levenshtein over atlas trie + scope identifiers
    - fix_it
    - hexa_explain_subcommand
    - multi_error_collector_with_cascade_compression
    - snapshot_regression_tests
  references: [RFC-019]
  # New diagnostics surfaced 2026-05-11 — stage 1 punch list v2 C4/C5/C10/C16/C20
  # promoted from silent fallbacks to real diagnostics. CLI drain wiring
  # (`compiler/main.hexa` post-lower `hir_to_mir_diags` drain, commit 18c6a536)
  # is required for HX1101/1102/1103 to surface alongside parser/check/units.
  new_codes_2026_05_11:
    HX1101:
      severity: Error
      stage: S2
      title: unbound ident in lower
      emitted_at: "compiler/lower/hir_to_mir.hexa (_lower_hexpr ident miss, was silent _const_int_op(0))"
    HX1102:
      severity: Error
      stage: S2
      title: unsupported pattern shape in lower
      emitted_at: "compiler/lower/hir_to_mir.hexa (match-arm pattern fallback)"
    HX1103:
      severity: Error
      stage: S2
      title: unhandled HExpr kind in lower
      emitted_at: "compiler/lower/hir_to_mir.hexa (HExpr default fall-through)"
    HX2001:
      severity: Error
      stage: S2
      title: undefined name
      emitted_at: "compiler/check/types.hexa::_types_check_call (non-Ident callee — auxiliary emit cooperating with bind.hexa's same code)"
    HX2003:
      severity: Error
      stage: S3
      title: callee is not callable
      emitted_at: "compiler/check/types.hexa::_types_check_call (callee_t.kind != \"fn\" — non-fn value invoked)"
  # Codes referenced by name in SPEC.md prose/examples but not in the
  # "new" set above — enumerated here so the render_spec drift check
  # (diag-code-set: SPEC.md ↔ SPEC.yaml) stays clean. Full catalog is
  # the SSOT at catalog_location, not this file.
  notable_existing_codes:
    HX1042:
      severity: Error   # fatal
      stage: S1
      title: atlas node not found
      emitted_at: "compiler/diag/catalog.hexa (atlas P/C/L/E resolve miss)"
      note: canonical @grace example in SPEC.md §8 (until=2026-06-01, legacy atlas refactor)

