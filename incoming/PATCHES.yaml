# Schema (one block per entry):
#   id                  — short stable kebab-case identifier
#   source_commit       — full or short SHA on main, or "pending" if not
#                         yet shipped from the external session
#   source_files        — paths touched by the patch (verified by
#                         tool/inbox_sync.hexa)
#   compiler_impact     — one-line note: shared-via-stdlib / requires
#                         compiler/ change / etc.
#   selftest_delta      — expected selftest count change, e.g.
#                         "+1 (35 -> 36)"
#   downstream_consumer — primary consumer that unblocks once applied
#   status              — pending_external | pending | applied | archived
#   applied_at          — YYYY-MM-DD when status flipped to applied
#                         (omitted otherwise)
#
# See incoming/INBOX.md for lifecycle.

