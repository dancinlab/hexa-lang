    hook rejected that shape; AOT users get streaming POST today,
    interp-mode POST callers should stay on buffered anthropic_send.

- id: wilson-needs-hexa-build-out-of-tree
  source: wilson session — `hexa build core/main.hexa` of the multi-module wilson project fails (linker undefined symbols) because `hexa build` doesn't pre-flatten use/import (only `hexa run` does); also clang -I points at <argv0-dir>/self (~/.hx/bin/self, nonexistent) so #include "runtime.c" fails.
  trees: [build-driver, install-layout]
  compiler_impact: `hexa build <entry>` should flatten (module_loader.hexa) -> transpile (hexa_v2) -> clang, like `hexa run` minus exec; clang -I should be $HEXA_LANG/self (or a stable install path); `hexa cc` shouldn't try to rebuild hexa_cc relative to cwd. Workarounds in place (manual flatten, ln -s ~/core/hexa-lang/self ~/.hx/bin/self).
  selftest_delta: 0 (a "build a 2-module out-of-tree project" smoke test would help)
  status: applied
  applied_at: 2026-05-11
  applied_commit: 21e7b518
  priority: 2 (blocks `hexa build` of out-of-tree multi-module projects = wilson; manual pipeline works)
  opened: 2026-05-11
  detail: patches/wilson-needs-hexa-build-out-of-tree.md
  note: |
    Two issues in (1) flatten and (2) include path, both fixed in 21e7b518:
    (1) cmd_build now mirrors cmd_run's flatten step — uses
        self/module_loader.hexa (full graph + fail-loud) instead of the
        legacy tool/flatten_imports.hexa (top-level-only + silent drop).
    (2) clang -I is resolved with priority $HEXA_LANG/self > argv0-dir/self
        > ./self (env-then-file_exists chain) so installed hexa_real at
        ~/.hx/bin/ no longer needs the `ln -s ~/core/hexa-lang/self
        ~/.hx/bin/self` workaround. Applied to both native clang and
        zig cc cross-target paths. (3) `hexa cc <file>` cwd-relative
        hexa_cc.c rebuild still pending — minor; rebuild path is only hit
        when invoking the transpile-self pipeline from outside the repo,
        and the practical workaround is `cd $HEXA_LANG && hexa cc`.
    Verified 2026-05-11 after the hexa_real re-promote (774c5d32): an
    out-of-tree 2-file `use` program builds clean (module_loader flatten +
    correct `-I`). The wilson build itself now flattens + transpiles +
    reaches clang (the old link-time undefined-symbol failure is gone) but
    hits a NEW C-compile wall: (a) match-arm enum-payload bindings not
    emitted = RFC-020 A4 codegen gap (see `rfc020-enum-payload-variants`,
    BG task 72), and (b) some stdlib functions referenced by-value
    (`cancel_new`, `cancel_is_cancelled`, `read_line_stdin`, `split_ws`)
    are undeclared in the transpiled C — flatten-coverage or AOT-builtin
    gap. Full write-up: incoming/notes/2026-05-11-wilson-build-codegen-wall.md.
