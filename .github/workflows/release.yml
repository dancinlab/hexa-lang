name: release

# Release build matrix — fires on tag push (`v*`), bootstraps the self-host
# pipeline on each runner, packages the resulting `hexa` + `build/` sidecar
# binaries as `hexa-<target>.tar.gz`, and uploads them to the GitHub Release
# that the tag created. `install.sh` fetches these assets verbatim:
#
#   https://github.com/dancinlab/hexa-lang/releases/download/<tag>/hexa-<target>.tar.gz
#
# Targets (install.sh detect_target — uname{-s,-m} → {darwin|linux}-{arm64|x86_64}):
#   · darwin-arm64    macos-latest         Apple Silicon
#   · linux-x86_64    ubuntu-latest
#   · linux-arm64     ubuntu-24.04-arm     GA-confirmed by bootstrap.yml
#
# Archive layout (install.sh L80-103):
#   hexa-<target>/
#     hexa                          # CLI binary (becomes ~/.hx/bin/hexa.real)
#     build/hexa_module_loader      # `hexa build` flatten helper
#     release/precompile/           # GO M4 — pre-built cache binaries (hexa_run.<key>)
#                                   # so first `hexa run <shipped-script>` skips clang fork
#
# The bootstrap chain is duplicated verbatim from bootstrap.yml to keep the
# two workflows independent (per bootstrap.yml's INDEPENDENCE clause).

on:
  push:
    tags: ['v*']
    branches: [main]      # → rolling `edge` prerelease (install via HEXA_VERSION=edge)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build assets for'
        required: true

permissions:
  contents: write  # gh release upload + edge tag force-move

# Tag push (v*) keeps every run — distinct group per tag, no cancellation.
# Main push only ever needs the latest commit's edge build; cancel any
# older in-flight edge run when a newer main push lands.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

env:
  CFLAGS_COMMON: "-O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs"

jobs:
  # ── Setup — decide release tag + force-move `edge` on main push ────
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.c.outputs.release_tag }}
      is_tag: ${{ steps.c.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v6

      - id: c
        name: Compute release_tag + is_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.tag }}" ]; then
              echo "release_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
              echo "is_tag=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
              echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
              echo "release_tag=edge" >> "$GITHUB_OUTPUT"
              echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
          cat "$GITHUB_OUTPUT"

      # softprops/action-gh-release@v2 will create-or-update the release
      # at the named tag, but it does NOT move an existing tag to a new
      # commit. For `edge` (rolling), force-move the git tag here so the
      # release's commit and the tag's commit stay in lock-step.
      - name: Force-move `edge` tag (main push only)
        if: steps.c.outputs.is_tag != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag -f edge "${{ github.sha }}"
          git push origin -f edge
  # ── macOS arm64 (Apple Silicon) ────────────────────────────
  release-macos-arm64:
    name: release (darwin-arm64)
    needs: setup
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0-pre — warm-bootstrap regen seed .c (fallback-safe)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # WARM_BOOTSTRAP.md Phase 3 — toward .hexa-only. If a prior edge hexa
          # downloads, regenerate the runtime.c amalgamation seed .c from their
          # *_emit.hexa SSOTs. FALLBACK-SAFE: any failure OR regen drift →
          # restore the tracked .c (git checkout) so Stage-0 compiles the
          # committed seed (current cold-bootstrap). No-op today (seed tracked);
          # load-bearing after Phase 4 (.c gitignored).
          ASSET="hexa-darwin-arm64.tar.gz"
          if gh release download edge --pattern "$ASSET" --dir /tmp/prior 2>/dev/null \
             && tar xzf "/tmp/prior/$ASSET" -C /tmp/prior 2>/dev/null; then
            PH="$(find /tmp/prior -type f -name hexa | head -1)"
            if [ -n "$PH" ] && "$PH" --version >/dev/null 2>&1; then
              if HEXA_RUN_CMD="$PH run" "$PH" run tool/regen_native_runtime_c_includes.hexa; then
                echo "warm: amalgamation seed .c regenerated + verified byte-identical"
              else
                echo "warm: regen drift/fail — restoring tracked .c"
                git checkout -- self/runtime_core.c self/runtime_hi_gen.c self/native/*.c 2>/dev/null || true
              fi
            else echo "warm: prior hexa unusable — tracked .c fallback"; fi
          else echo "warm: no prior edge hexa — tracked .c (cold-bootstrap)"; fi
          test -f self/runtime_core.c && echo "Stage-0 seed present ✓"

      - name: Stage 0 — compile self-hosted transpiler (hexa_v2)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p self/native build/stage1
          # .c-graduation Phase 2 (ADDITIVE) — opt-in prebuilt-runtime link.
          # When HEXA_PREBUILT_RUNTIME=<path> is set + the file exists, link the
          # prebuilt object (built in Stage 0b from the SAME runtime.c) instead of
          # re-compiling self/runtime.c (+ its #include seed .c) from source. This
          # is the seam the .c=0 graduation needs: hexa_cc.c only #includes
          # runtime.h, so it links a prebuilt runtime.a with NO seed .c present.
          # FALLBACK-SAFE: env unset OR file absent → source path (runtime.c).
          RT_ARG="self/runtime.c"
          if [ -n "${HEXA_PREBUILT_RUNTIME:-}" ] && [ -f "${HEXA_PREBUILT_RUNTIME}" ]; then
              echo "Stage-0: HEXA_PREBUILT_RUNTIME set — linking prebuilt: $HEXA_PREBUILT_RUNTIME"
              RT_ARG="$HEXA_PREBUILT_RUNTIME"
          fi
          clang $CFLAGS_COMMON \
              -I self self/native/hexa_cc.c "$RT_ARG" \
              -o build/hexa_v2
          file build/hexa_v2

      # ── .c-graduation Phase 1 (ADDITIVE) — prebuilt runtime archive ──
      # Compiles the SAME self/runtime.c with the SAME CFLAGS into a
      # standalone object + archive (build/runtime.a). This is the
      # "frozen dough" (rustc/gcc stage0 pattern): a future `hexa cc` /
      # Stage-0 can LINK this prebuilt object instead of re-compiling
      # runtime.c (+ its #include "runtime_core.c" seed) from source —
      # opt-in via HEXA_PREBUILT_RUNTIME=<path>. This step does NOT touch
      # the source-compile path above; if it ever fails, the existing
      # bootstrap stays green (the artifact is purely an extra asset).
      - name: Stage 0b — build prebuilt runtime archive (runtime.a)
        shell: bash
        run: |
          set -euo pipefail
          clang $CFLAGS_COMMON -I self -c self/runtime.c -o build/runtime.o
          ar rcs build/runtime.a build/runtime.o
          file build/runtime.o
          ls -la build/runtime.a

      - name: Stage 1 — flatten + transpile self/main.hexa → build/stage1/main.c
        shell: bash
        run: |
          set -euo pipefail
          ./build/hexa_v2 self/module_loader.hexa build/stage1/module_loader.c
          clang $CFLAGS_COMMON \
              -I self build/stage1/module_loader.c self/runtime.c \
              -o build/hexa_module_loader
          ./build/hexa_module_loader self/main.hexa build/stage1/main_expanded.hexa
          ./build/hexa_v2 build/stage1/main_expanded.hexa build/stage1/main.c

      - name: Stage 2 — compile CLI driver (./hexa)
        shell: bash
        run: |
          set -euo pipefail
          clang $CFLAGS_COMMON \
              -I self build/stage1/main.c self/runtime.c \
              -o hexa
          file hexa

      # ── macOS Developer ID signing (GATED · skips cleanly when secrets
      # absent → release ships ad-hoc and install.sh strips quarantine +
      # re-signs locally on each Mac). Activate by adding repo secrets:
      #   MACOS_CERT_P12       base64 of a "Developer ID Application" .p12
      #   MACOS_CERT_PASSWORD  the .p12 export password
      #   MACOS_SIGN_IDENTITY  e.g. "Developer ID Application: NAME (TEAMID)"
      # Hardened runtime (--options runtime) is intentionally OFF: the driver
      # dlopen()s (forge/crypto), so enabling it needs entitlements
      # (allow-dyld-environment-variables · allow-jit · disable-library-
      # validation). Add an entitlements plist + flip the flag once verified
      # on a real notarization run. Developer ID signing is a prerequisite for
      # the notarize step after Package.
      - name: Stage 2b — Developer ID codesign (gated)
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          # In-script gate: the `secrets` context is NOT allowed in a step-level
          # `if:` (GitHub rejects the whole workflow file). Guard on the
          # env-exported secret instead — skips cleanly when the cert is absent.
          if [ -z "${MACOS_CERT_P12:-}" ]; then
            echo "codesign: MACOS_CERT_P12 secret absent — skipping Developer ID signing"
            exit 0
          fi
          KC="$RUNNER_TEMP/hexa-sign.keychain-db"
          KCPW="$(uuidgen)"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: -k "$KCPW" "$KC" >/dev/null
          codesign --force --timestamp --sign "$MACOS_SIGN_IDENTITY" --identifier hexad hexa
          codesign --verify --verbose hexa
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Stage 2b — sign SKIP notice
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
        run: |
          if [ -z "${MACOS_CERT_P12:-}" ]; then
            echo "::notice::Developer ID signing SKIPPED (no MACOS_CERT_P12) — release ships ad-hoc; install.sh strips quarantine + re-signs locally per Mac."
          fi

      # ── GO M4 — precompile shipped scripts into release/precompile/
      # so the tarball's first `hexa run <script>` skips the clang fork
      # (cold-cache fork-storm mitigation, internal axis). Each manifest
      # entry in tool/precompile.json → release/precompile/hexa_run.<key>.
      # HEXA_MODULE_LOADER points at the just-built loader to dodge the
      # silent-stub link-fail trap (compiled `use` needs the env hint).
      - name: Stage 3 — precompile shipped scripts (release/precompile/)
        shell: bash
        run: |
          set -euo pipefail
          export HEXA_LANG="$PWD"
          export HEXA_MODULE_LOADER="$PWD/build/hexa_module_loader"
          export PATH="$PWD:$PATH"
          ./hexa run tool/build_precompile.hexa
          echo "--- release/precompile/ contents ---"
          ls -la release/precompile/
          test -d release/precompile
          test "$(ls -1 release/precompile/ | wc -l)" -gt 0

      - name: Package — hexa-darwin-arm64.tar.gz
        shell: bash
        run: |
          set -euo pipefail
          target="darwin-arm64"
          stage="dist/hexa-${target}"
          mkdir -p "$stage/build" "$stage/release/precompile"
          cp hexa "$stage/hexa"
          cp build/hexa_module_loader "$stage/build/hexa_module_loader"
          # .c-graduation Phase 1 — ship the prebuilt runtime archive so an
          # installed tree can link it (HEXA_PREBUILT_RUNTIME) instead of
          # compiling runtime.c from source. Additive asset only.
          cp build/runtime.a "$stage/build/runtime.a"
          # GO M4 — ship precompiled binaries from Stage 3.
          cp -R release/precompile/. "$stage/release/precompile/"
          tar -czf "hexa-${target}.tar.gz" -C dist "hexa-${target}"
          ls -la "hexa-${target}.tar.gz"
          # GO M4 smoke — tarball MUST embed release/precompile/ with ≥1 entry.
          n=$(tar -tzf "hexa-${target}.tar.gz" | grep -cE "hexa-${target}/release/precompile/[^/]+$" || true)
          echo "tarball precompile entries: $n"
          test "$n" -gt 0

      # ── Notarize the tarball (GATED · requires the Developer ID signing step
      # above + secrets MACOS_NOTARY_APPLE_ID / MACOS_NOTARY_TEAM_ID /
      # MACOS_NOTARY_PASSWORD (app-specific password)). notarytool registers the
      # signed binary's cdhash with Apple so Gatekeeper passes online. Bare CLI
      # binaries can't be stapled (stapler only staples .app/.dmg/.pkg), so the
      # ticket is online-only — fine for `curl|bash` installs. Skips cleanly
      # when the secret is absent.
      - name: Notarize tarball (gated)
        shell: bash
        env:
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${NOTARY_PASSWORD:-}" ]; then
            echo "notarize: MACOS_NOTARY_PASSWORD absent — skipping notarization"
            exit 0
          fi
          xcrun notarytool submit hexa-darwin-arm64.tar.gz \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.release_tag }}
          prerelease: ${{ needs.setup.outputs.is_tag != 'true' }}
          make_latest: ${{ needs.setup.outputs.is_tag == 'true' && 'true' || 'false' }}
          target_commitish: ${{ github.sha }}
          files: hexa-darwin-arm64.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ── Linux x86_64 ───────────────────────────────────────────
  release-linux-x86_64:
    name: release (linux-x86_64)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0-pre — warm-bootstrap regen seed .c (fallback-safe)
