name: nobaseline-gate

# ── .c-graduation faithful-nobaseline gate ──────────────────────────────────
#
# `.c=0` has landed on main (tracked `.c` = 0; real 3-platform release green).
# The old seed-present DRY-RUN jobs (nobaseline-* / final3-*) ASSUMED the
# bootstrap seeds were present at checkout and temp-removed / cold-compiled
# them; on a `.c=0` tree those seeds no longer exist, so those jobs failed
# forever and were self-redundant. They have been RETIRED.
#
# The faithful-nobaseline-* jobs below ARE the authoritative seed-removed gate:
# they remove ALL seeds FIRST (via $SEEDS), then build via the SAME shared
# tool/release_build + tool/release_package the real release runs, edge-pulling
# runtime.a + build/hexat. gate-green ≡ release-green by shared definition.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CFLAGS_COMMON: "-O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs"
  # ALL 23 seeds — the 18 warm-regen seeds + 2 root bootstrap seeds + the 3
  # extra graduation seeds (hexa_cc.c, forge_tier_v1.c, the classd test
  # harness). The faithful jobs TEMP-remove ALL of them FIRST (via $SEEDS),
  # then run the VERBATIM shared release path (release_build + release_package)
  # edge-pulling runtime.a + build/hexat — so NO seed is ever compiled.
  SEEDS: >-
    self/runtime_core.c self/runtime_hi_gen.c self/runtime.c
    self/bootstrap_compiler.c
    self/native/crypto_openssl.c self/native/crypto_sodium.c
    self/native/exec_argv_sha256.c self/native/exec_pipe.c
    self/native/fp_init.c self/native/mount.c self/native/namespace.c
    self/native/net.c self/native/persistent_pipe.c self/native/proc_fork.c
    self/native/pty.c self/native/signal_flock.c self/native/tensor_kernels.c
    self/native/term_ffi.c self/native/thread.c self/native/wait.c
    self/native/hexa_cc.c self/forge/forge_tier_v1.c
    test/native_build/classd_behavioral_harness.c

jobs:
  # ── faithful-nobaseline — the authoritative seed-removed release-safety gate.
  #
  # These faithful-* jobs model a `.c=0` checkout FAITHFULLY: remove ALL seeds
  # FIRST (via $SEEDS), then resolve runtime.a AND build/hexat from the prior
  # edge tarball (NEVER prebuild either from seeds), then build + package via
  # the IDENTICAL shared entry points release.yml calls (tool/release_build then
  # tool/release_package) — with NO seed ever compiled. There is no separate
  # gate copy of the stage sequence to drift from release; this IS a dynamic
  # seed-removed run of the real release path. gate-green ≡ release-green by
  # shared definition.
  faithful-nobaseline-darwin-arm64:
    name: faithful-nobaseline (darwin-arm64)
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      # FAITHFUL: remove ALL 23 seeds BEFORE anything builds — models the
      # .c=0 checkout (seeds git-removed). No source compile is possible.
      - name: Faithful — TEMP-remove ALL 23 seeds FIRST (working copy only)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds BEFORE any build; tracked .c now:"
          git ls-files '*.c' | wc -l
          ls self/*.c 2>/dev/null || echo "  (no self/*.c — expected on .c=0)"

      # ── SINGLE-JOB-FAITHFUL: this job now runs the IDENTICAL shared entry
      # points release.yml calls — tool/release_build then tool/release_package —
      # with the 23 seeds REMOVED. There is no separate gate copy of the stage
      # sequence to drift from release; this IS a dynamic seed-removed run of the
      # real release path. gate-green ≡ release-green by shared definition.
      - name: Build — shared release_build (seeds removed, edge-pull)
        shell: bash
        env:
          TARGET: darwin-arm64
          CC: clang
          LIBS: ""
          GH_TOKEN: ${{ github.token }}
        run: bash tool/release_build

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "faithful-nobaseline OK (darwin-arm64)"

      - name: Package — shared release_package (seeds removed)
        shell: bash
        env:
          TARGET: darwin-arm64
          CC: clang
          LIBS: ""
          GH_TOKEN: ${{ github.token }}
        run: bash tool/release_package

  faithful-nobaseline-linux-x86_64:
    name: faithful-nobaseline (linux-x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Faithful — TEMP-remove ALL 23 seeds FIRST (working copy only)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds BEFORE any build; tracked .c now:"
          git ls-files '*.c' | wc -l

      # ── SINGLE-JOB-FAITHFUL — same shared release_build + release_package the
      # real release runs, with seeds removed. Dynamic seed-removed run of the
      # real release path (no separate copy). See darwin job for full rationale.
      - name: Build — shared release_build (seeds removed, edge-pull)
        shell: bash
        env:
          TARGET: linux-x86_64
          CC: gcc
          LIBS: "-lm -ldl"
          GH_TOKEN: ${{ github.token }}
        run: bash tool/release_build

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "faithful-nobaseline OK (linux-x86_64)"

      - name: Package — shared release_package (seeds removed)
        shell: bash
        env:
          TARGET: linux-x86_64
          CC: gcc
          LIBS: "-lm -ldl"
          GH_TOKEN: ${{ github.token }}
        run: bash tool/release_package

  faithful-nobaseline-linux-arm64:
    name: faithful-nobaseline (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Faithful — TEMP-remove ALL 23 seeds FIRST (working copy only)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds BEFORE any build; tracked .c now:"
          git ls-files '*.c' | wc -l

      # ── SINGLE-JOB-FAITHFUL — same shared release_build + release_package the
      # real release runs, with seeds removed. See darwin job for full rationale.
      - name: Build — shared release_build (seeds removed, edge-pull)
        shell: bash
        env:
          TARGET: linux-arm64
          CC: gcc
          LIBS: "-lm -ldl"
          GH_TOKEN: ${{ github.token }}
        run: bash tool/release_build

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "faithful-nobaseline OK (linux-arm64)"

      - name: Package — shared release_package (seeds removed)
        shell: bash
        env:
          TARGET: linux-arm64
          CC: gcc
          LIBS: "-lm -ldl"
          GH_TOKEN: ${{ github.token }}
        run: bash tool/release_package
