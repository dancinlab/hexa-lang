name: nobaseline-gate

# ── .c-graduation Phase 2 — no-baseline DRY-RUN gate ────────────────────────
#
# Proves that removing the bootstrap seed `.c` files is SAFE *before* any real
# removal lands (Phase 3+). On each release platform it:
#
#   1. Stage 0b  — build build/runtime.a from the FULL self/runtime.c source
#                  (seeds still present), the "frozen dough".
#   2. TEMP-remove the 18 warm-regen seeds + 2 root seeds (runtime.c,
#      bootstrap_compiler.c) FROM THE WORKING COPY ONLY — never committed.
#      hexa_cc.c is kept (it #includes only runtime.h, links runtime.a).
#   3. Stage 0/1/2 via the prebuilt path (HEXA_PREBUILT_RUNTIME=build/runtime.a)
#      — clang/gcc hexa_cc.c + runtime.a, transpile module_loader + main,
#      compile ./hexa — all with the seeds GONE.
#   4. Assert ./hexa --version succeeds (green).
#
# This is the gate the #2011 break taught us to require: local byte-identical
# checks are NOT enough — the no-baseline path must build green on the CI
# edge-compile path, all 3 release platforms, before `git rm` of any seed.
#
# DRY-RUN ONLY: the removal happens in the runner's checkout and is never
# committed. The tracked .c count stays 23.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CFLAGS_COMMON: "-O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs"
  # The 18 warm-regen seeds + 2 root bootstrap seeds removed in the dry-run.
  # hexa_cc.c is deliberately KEPT (compiler source, #includes runtime.h only).
  SEEDS: >-
    self/runtime_core.c self/runtime_hi_gen.c self/runtime.c
    self/bootstrap_compiler.c
    self/native/crypto_openssl.c self/native/crypto_sodium.c
    self/native/exec_argv_sha256.c self/native/exec_pipe.c
    self/native/fp_init.c self/native/mount.c self/native/namespace.c
    self/native/net.c self/native/persistent_pipe.c self/native/proc_fork.c
    self/native/pty.c self/native/signal_flock.c self/native/tensor_kernels.c
    self/native/term_ffi.c self/native/thread.c self/native/wait.c

jobs:
  nobaseline-darwin-arm64:
    name: nobaseline (darwin-arm64)
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0b — build prebuilt runtime archive (runtime.a)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/stage1
          clang $CFLAGS_COMMON -I self -c self/runtime.c -o build/runtime.o
          ar rcs build/runtime.a build/runtime.o
          file build/runtime.o
          ls -la build/runtime.a

      - name: Dry-run — TEMP-remove seeds (working copy only, NOT committed)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds; remaining self/**/*.c:"
          find self -name '*.c' | sort
          # hexa_cc.c (+ forge_tier_v1.c, unused via prebuilt) must remain.
          test -f self/native/hexa_cc.c
          test ! -f self/runtime.c

      - name: Stage 0 — hexa_v2 via prebuilt (no runtime.c)
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: |
          set -euo pipefail
          clang $CFLAGS_COMMON -I self self/native/hexa_cc.c "$HEXA_PREBUILT_RUNTIME" -o build/hexa_v2
          file build/hexa_v2

      - name: Stage 1+2 — transpile + driver via prebuilt
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: |
          set -euo pipefail
          export HEXA_LANG="$PWD"
          ./build/hexa_v2 self/module_loader.hexa build/stage1/module_loader.c
          clang $CFLAGS_COMMON -I self build/stage1/module_loader.c "$HEXA_PREBUILT_RUNTIME" -o build/hexa_module_loader
          export HEXA_MODULE_LOADER="$PWD/build/hexa_module_loader"
          ./build/hexa_module_loader self/main.hexa build/stage1/main_expanded.hexa
          ./build/hexa_v2 build/stage1/main_expanded.hexa build/stage1/main.c
          clang $CFLAGS_COMMON -I self build/stage1/main.c "$HEXA_PREBUILT_RUNTIME" -o hexa
          file hexa

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "::notice::no-baseline dry-run GREEN (darwin-arm64) — seed removal is build-safe via prebuilt runtime.a"

  nobaseline-linux-x86_64:
    name: nobaseline (linux-x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0b — build prebuilt runtime archive (runtime.a)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/stage1
          gcc $CFLAGS_COMMON -I self -c self/runtime.c -o build/runtime.o
          ar rcs build/runtime.a build/runtime.o
          file build/runtime.o
          ls -la build/runtime.a

      - name: Dry-run — TEMP-remove seeds (working copy only, NOT committed)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds; remaining self/**/*.c:"
          find self -name '*.c' | sort
          test -f self/native/hexa_cc.c
          test ! -f self/runtime.c

      - name: Stage 0 — hexa_v2 via prebuilt (no runtime.c)
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: |
          set -euo pipefail
          gcc $CFLAGS_COMMON -I self self/native/hexa_cc.c "$HEXA_PREBUILT_RUNTIME" -o build/hexa_v2 -lm -ldl
          file build/hexa_v2

      - name: Stage 1+2 — transpile + driver via prebuilt
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: |
          set -euo pipefail
          export HEXA_LANG="$PWD"
          ./build/hexa_v2 self/module_loader.hexa build/stage1/module_loader.c
          gcc $CFLAGS_COMMON -I self build/stage1/module_loader.c "$HEXA_PREBUILT_RUNTIME" -o build/hexa_module_loader -lm -ldl
          export HEXA_MODULE_LOADER="$PWD/build/hexa_module_loader"
          ./build/hexa_module_loader self/main.hexa build/stage1/main_expanded.hexa
          ./build/hexa_v2 build/stage1/main_expanded.hexa build/stage1/main.c
          gcc $CFLAGS_COMMON -I self build/stage1/main.c "$HEXA_PREBUILT_RUNTIME" -o hexa -lm -ldl
          file hexa

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "::notice::no-baseline dry-run GREEN (linux-x86_64) — seed removal is build-safe via prebuilt runtime.a"

  nobaseline-linux-arm64:
    name: nobaseline (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0b — build prebuilt runtime archive (runtime.a)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/stage1
          gcc $CFLAGS_COMMON -I self -c self/runtime.c -o build/runtime.o
          ar rcs build/runtime.a build/runtime.o
          file build/runtime.o
          ls -la build/runtime.a

      - name: Dry-run — TEMP-remove seeds (working copy only, NOT committed)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds; remaining self/**/*.c:"
          find self -name '*.c' | sort
          test -f self/native/hexa_cc.c
          test ! -f self/runtime.c

      - name: Stage 0 — hexa_v2 via prebuilt (no runtime.c)
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: |
          set -euo pipefail
          gcc $CFLAGS_COMMON -I self self/native/hexa_cc.c "$HEXA_PREBUILT_RUNTIME" -o build/hexa_v2 -lm -ldl
          file build/hexa_v2

      - name: Stage 1+2 — transpile + driver via prebuilt
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: |
          set -euo pipefail
          export HEXA_LANG="$PWD"
          ./build/hexa_v2 self/module_loader.hexa build/stage1/module_loader.c
          gcc $CFLAGS_COMMON -I self build/stage1/module_loader.c "$HEXA_PREBUILT_RUNTIME" -o build/hexa_module_loader -lm -ldl
          export HEXA_MODULE_LOADER="$PWD/build/hexa_module_loader"
          ./build/hexa_module_loader self/main.hexa build/stage1/main_expanded.hexa
          ./build/hexa_v2 build/stage1/main_expanded.hexa build/stage1/main.c
          gcc $CFLAGS_COMMON -I self build/stage1/main.c "$HEXA_PREBUILT_RUNTIME" -o hexa -lm -ldl
          file hexa

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "::notice::no-baseline dry-run GREEN (linux-arm64) — seed removal is build-safe via prebuilt runtime.a"
