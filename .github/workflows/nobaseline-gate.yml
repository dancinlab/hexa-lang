name: nobaseline-gate

# ── .c-graduation Phase 2 — no-baseline DRY-RUN gate ────────────────────────
#
# Proves that removing the bootstrap seed `.c` files is SAFE *before* any real
# removal lands (Phase 3+). On each release platform it:
#
#   1. Stage 0b  — build build/runtime.a from the FULL self/runtime.c source
#                  (seeds still present), the "frozen dough".
#   2. TEMP-remove the 18 warm-regen seeds + 2 root seeds (runtime.c,
#      bootstrap_compiler.c) FROM THE WORKING COPY ONLY — never committed.
#      hexa_cc.c is kept (it #includes only runtime.h, links runtime.a).
#   3. Stage 0/1/2 via the prebuilt path (HEXA_PREBUILT_RUNTIME=build/runtime.a)
#      — clang/gcc hexa_cc.c + runtime.a, transpile module_loader + main,
#      compile ./hexa — all with the seeds GONE.
#   4. Assert ./hexa --version succeeds (green).
#
# This is the gate the #2011 break taught us to require: local byte-identical
# checks are NOT enough — the no-baseline path must build green on the CI
# edge-compile path, all 3 release platforms, before `git rm` of any seed.
#
# DRY-RUN ONLY: the removal happens in the runner's checkout and is never
# committed. The tracked .c count stays 23.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CFLAGS_COMMON: "-O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs"
  # ALL 23 seeds — the 18 warm-regen seeds + 2 root bootstrap seeds + the 3
  # extra graduation seeds (hexa_cc.c, forge_tier_v1.c, the classd test
  # harness). The gate TEMP-removes ALL of them, then runs the VERBATIM shared
  # release path (stage_regen_hexa_cc + stage_build_hexa + stage_precompile_
  # package). hexa_cc.c is now removed too and recreated by the regen step, so
  # gate == release byte-for-byte (the 5th-failure drift is structurally sealed).
  SEEDS: >-
    self/runtime_core.c self/runtime_hi_gen.c self/runtime.c
    self/bootstrap_compiler.c
    self/native/crypto_openssl.c self/native/crypto_sodium.c
    self/native/exec_argv_sha256.c self/native/exec_pipe.c
    self/native/fp_init.c self/native/mount.c self/native/namespace.c
    self/native/net.c self/native/persistent_pipe.c self/native/proc_fork.c
    self/native/pty.c self/native/signal_flock.c self/native/tensor_kernels.c
    self/native/term_ffi.c self/native/thread.c self/native/wait.c
    self/native/hexa_cc.c self/forge/forge_tier_v1.c
    test/native_build/classd_behavioral_harness.c

jobs:
  nobaseline-darwin-arm64:
    name: nobaseline (darwin-arm64)
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      # Stage 0b — resolve runtime.a via the SAME script release.yml uses.
      # Seeds present here, so it compiles runtime.a from source.
      - name: Stage 0b — resolve prebuilt runtime archive (runtime.a)
        shell: bash
        env:
          CC: clang
          LIBS: ""
          EDGE_ASSET: hexa-darwin-arm64.tar.gz
          GH_TOKEN: ${{ github.token }}
        run: bash tool/stage_resolve_runtime_a

      - name: Dry-run — TEMP-remove ALL 23 seeds (working copy only, NOT committed)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds; remaining self/**/*.c:"
          find self -name '*.c' | sort
          # ALL 23 removed including hexa_cc.c (recreated by stage_regen_hexa_cc).
          test ! -f self/runtime.c
          test ! -f self/native/hexa_cc.c

      # Regenerate hexa_cc.c via the SAME script release.yml uses (edge-regen),
      # since it is now among the removed seeds.
      - name: Stage 0a — regen hexa_cc.c (shared tool/stage_regen_hexa_cc)
        shell: bash
        env:
          CC: clang
          EDGE_ASSET: hexa-darwin-arm64.tar.gz
          GH_TOKEN: ${{ github.token }}
        run: bash tool/stage_regen_hexa_cc

      # Stage 0/1/2 via the EXACT release.yml script (tool/stage_build_hexa) —
      # this is what closes the false-green class: the gate now exercises the
      # real release stage logic, not a gate-only simplified path.
      - name: Stage 0/1/2 — REAL release build (shared tool/stage_build_hexa)
        shell: bash
        env:
          CC: clang
          LIBS: ""
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: bash tool/stage_build_hexa

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "::notice::no-baseline Stage-0/1/2 GREEN (darwin-arm64) — seeds removed via prebuilt runtime.a"

      # .c-graduation Phase-3 driver fix gate (THE missing piece): the prior
      # nobaseline gate stopped at Stage 0/1/2 + --version and MISSED Stage 3
      # (precompile), which is where #2040 actually died — `hexa run
      # tool/build_precompile.hexa` shells `hexa build <s>` per manifest entry,
      # and the `hexa build` DRIVER hard-compiled self/runtime.c (now removed).
      # This step exercises the REAL Stage 3 + Package release sequence with the
      # seeds GONE, so the gate finally == the full release path including the
      # in-binary runtime-compile. HEXA_PREBUILT_RUNTIME is exported so the
      # fixed driver links the prebuilt archive instead of the absent runtime.c.
      # Stage 3 + Package via the EXACT release.yml SHARED script — this is the
      # final drift seam (the 5th failure): release was MISSING the HEXA_PREBUILT_
      # RUNTIME export here. Now BOTH workflows call tool/stage_precompile_package
      # → byte-identical → drift structurally impossible.
      - name: Stage 3 + Package — REAL release path (shared tool/stage_precompile_package)
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
          # CI dry-run bypass for the Darwin `hexa build` panic-trigger refuse
          # gate (output-under-/tmp guard); non-heavy precompile only.
          HEXA_MAC_BUILD_OK: "1"
        run: TARGET=darwin-arm64 bash tool/stage_precompile_package

  nobaseline-linux-x86_64:
    name: nobaseline (linux-x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0b — resolve prebuilt runtime archive (runtime.a)
        shell: bash
        env:
          CC: gcc
          LIBS: "-lm -ldl"
          EDGE_ASSET: hexa-linux-x86_64.tar.gz
          GH_TOKEN: ${{ github.token }}
        run: bash tool/stage_resolve_runtime_a

      - name: Dry-run — TEMP-remove ALL 23 seeds (working copy only, NOT committed)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds; remaining self/**/*.c:"
          find self -name '*.c' | sort
          test ! -f self/runtime.c
          test ! -f self/native/hexa_cc.c

      - name: Stage 0a — regen hexa_cc.c (shared tool/stage_regen_hexa_cc)
        shell: bash
        env:
          CC: gcc
          EDGE_ASSET: hexa-linux-x86_64.tar.gz
          GH_TOKEN: ${{ github.token }}
        run: bash tool/stage_regen_hexa_cc

      - name: Stage 0/1/2 — REAL release build (shared tool/stage_build_hexa)
        shell: bash
        env:
          CC: gcc
          LIBS: "-lm -ldl"
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: bash tool/stage_build_hexa

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "::notice::no-baseline Stage-0/1/2 GREEN (linux-x86_64) — seeds removed via prebuilt runtime.a"

      # Stage 3 + Package via the EXACT release SHARED script (gate == release).
      - name: Stage 3 + Package — REAL release path (shared tool/stage_precompile_package)
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: TARGET=linux-x86_64 bash tool/stage_precompile_package

  nobaseline-linux-arm64:
    name: nobaseline (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Stage 0b — resolve prebuilt runtime archive (runtime.a)
        shell: bash
        env:
          CC: gcc
          LIBS: "-lm -ldl"
          EDGE_ASSET: hexa-linux-arm64.tar.gz
          GH_TOKEN: ${{ github.token }}
        run: bash tool/stage_resolve_runtime_a

      - name: Dry-run — TEMP-remove ALL 23 seeds (working copy only, NOT committed)
        shell: bash
        run: |
          set -euo pipefail
          for f in $SEEDS; do rm -f "$f"; done
          echo "removed seeds; remaining self/**/*.c:"
          find self -name '*.c' | sort
          test ! -f self/runtime.c
          test ! -f self/native/hexa_cc.c

      - name: Stage 0a — regen hexa_cc.c (shared tool/stage_regen_hexa_cc)
        shell: bash
        env:
          CC: gcc
          EDGE_ASSET: hexa-linux-arm64.tar.gz
          GH_TOKEN: ${{ github.token }}
        run: bash tool/stage_regen_hexa_cc

      - name: Stage 0/1/2 — REAL release build (shared tool/stage_build_hexa)
        shell: bash
        env:
          CC: gcc
          LIBS: "-lm -ldl"
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: bash tool/stage_build_hexa

      - name: Assert — ./hexa runs with seeds removed
        shell: bash
        run: |
          set -euo pipefail
          ./hexa --version
          echo "::notice::no-baseline Stage-0/1/2 GREEN (linux-arm64) — seeds removed via prebuilt runtime.a"

      # Stage 3 + Package via the EXACT release SHARED script (gate == release).
      - name: Stage 3 + Package — REAL release path (shared tool/stage_precompile_package)
        shell: bash
        env:
          HEXA_PREBUILT_RUNTIME: ${{ github.workspace }}/build/runtime.a
        run: TARGET=linux-arm64 bash tool/stage_precompile_package

  # ── .c-graduation Phase 4/5 — FINAL 3 tracked .c removal-safety DRY-RUN ─────
  #
  # The 20 warm-regen seeds are already UNtracked (Phase 3, #2035) → tracked
  # .c = 3. This matrix proves each of the FINAL 3 removal-safe, per platform,
  # WITHOUT committing any removal (working-copy temp-remove only):
  #
  #   A. self/native/hexa_cc.c — the C source of the self-hosted transpiler.
  #      Chicken-egg: a fresh checkout WITHOUT it has no C source to build the
  #      transpiler from. ESCAPE = download a prior edge `hexa` driver, run
  #      `hexa cc --regen` to REGENERATE hexa_cc.c, then Stage-0 builds the
  #      transpiler from the regenerated copy + prebuilt runtime.a. If regen
  #      cannot run in CI (stale binary can't parse current .hexa sources, or
  #      no edge asset) → HARD-BLOCKER reported, hexa_cc.c is irreducible.
  #
  #   B. self/forge/forge_tier_v1.c — "unused via prebuilt". Temp-remove it and
  #      confirm the full prebuilt Stage-0/1/2 build is still green → confirms
  #      the unused claim; removal trivially safe.
  #
  #   C. test/native_build/classd_behavioral_harness.c — a test fixture.
  #      Run gen_c_text_emitter to produce a verbatim `.c-text` emitter from
  #      the .c, then assert the regenerated source is BYTE-IDENTICAL (sha256)
  #      → the .c-text path reproduces it; removal safe (emitter regenerates).
  #
  # DRY-RUN ONLY — never committed. Tracked .c count stays 3.

  final3-darwin-arm64:
    name: final3 (darwin-arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      CC: clang
      LIBS: ""
      EDGE_ASSET: hexa-darwin-arm64.tar.gz
    steps:
      - uses: actions/checkout@v6
      - name: final3 removal-safety dry-run
        shell: bash
        run: bash tool/final3_gate_dryrun
        env:
          GH_TOKEN: ${{ github.token }}

  final3-linux-x86_64:
    name: final3 (linux-x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CC: gcc
      LIBS: "-lm -ldl"
      EDGE_ASSET: hexa-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v6
      - name: final3 removal-safety dry-run
        shell: bash
        run: bash tool/final3_gate_dryrun
        env:
          GH_TOKEN: ${{ github.token }}

  final3-linux-arm64:
    name: final3 (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    env:
      CC: gcc
      LIBS: "-lm -ldl"
      EDGE_ASSET: hexa-linux-arm64.tar.gz
    steps:
      - uses: actions/checkout@v6
      - name: final3 removal-safety dry-run
        shell: bash
        run: bash tool/final3_gate_dryrun
        env:
          GH_TOKEN: ${{ github.token }}
