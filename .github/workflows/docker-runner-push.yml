# docker-runner-push.yml — DISABLED (cold-seed removed by user decision 2026-05-30).
#
# PURPOSE (historical)
#   Built linux/amd64 + linux/arm64 hexa ELFs and pushed a multi-arch
#   hexa-runner image to ghcr.io/dancinlab/hexa-runner. The ELF build mirrored
#   bootstrap.yml's cold-seed Stage 0 — it compiled the CLI + interp from the
#   committed self-contained cold-seed `self/native/hexa_cc_seed.c`.
#
# WHY DISABLED
#   Per an explicit user decision (2026-05-30) the committed transpiler cold-seed
#   `self/native/hexa_cc_seed.c` was REMOVED (the repo now has ZERO committed
#   transpiler `.c`). A fresh-checkout SOURCE build of the ELFs is therefore
#   impossible on a runner with no pre-installed `hexa`, and the warm CI path
#   (download a released/edge hexa binary then build) is not wired here yet
#   (edge-tarball infra currently RED — handoff 726b8b67). Rather than leave the
#   build steps referencing the deleted seed (a dead-ref), this workflow is a
#   deliberate no-op. Reverses HEXA-CC-ZERO P6 (#2185).
#
# RE-ENABLE PATH
#   Restore the ELF build once a clean warm CI build (from a released hexa binary,
#   then `hexa cc --regen`) exists — never from a committed transpiler `.c` — then
#   re-attach the docker buildx push.

name: docker-runner-push

# Disabled: never triggers (the old build required the removed cold-seed).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: docker-runner-push (DISABLED — cold-seed removed by user decision)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Explain
        shell: bash
        run: |
          echo "docker-runner-push is DISABLED (cold-seed removed by user decision 2026-05-30)."
          echo "Its ELF build mirrored bootstrap.yml's cold-seed Stage 0, which compiled the"
          echo "CLI + interp from the removed self/native/hexa_cc_seed.c. The repo now has ZERO"
          echo "committed transpiler .c, so a fresh-checkout source build is unsupported."
          echo "Re-enable once a clean warm CI build (from a released hexa binary) is wired,"
          echo "then re-attach the docker buildx push."
