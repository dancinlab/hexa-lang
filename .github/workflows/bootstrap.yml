          ls -la self/native 2>&1 || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: hexa-linux-arm64
          path: |
            build/hexa_v2
          if-no-files-found: warn
          retention-days: 7
