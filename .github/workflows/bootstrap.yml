          if-no-files-found: error
          retention-days: 7

  # ── Linux arm64 (GA) ───────────────────────────────────────
  # ubuntu-24.04-arm GA confirmed: 11/11 consecutive green runs
  # (~60s) across free-tier scheduling. Promoted to hard gate.
  bootstrap-linux-arm64:
    name: bootstrap (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain info
