# bootstrap.yml — DISABLED (cold-seed removed by user decision 2026-05-30).
#
# WHY DISABLED
#   This matrix proved a FRESH `.c=0` checkout could bootstrap the self-hosted
#   transpiler with NO pre-installed `hexa` — using ONLY the committed,
#   self-contained cold-seed `self/native/hexa_cc_seed.c` (HEXA-CC-ZERO P3/P5/P6).
#
#   Per an explicit user decision (2026-05-30), the committed transpiler cold-seed
#   `self/native/hexa_cc_seed.c` was REMOVED — the repo now has ZERO committed
#   transpiler `.c`. Building requires EITHER a pre-existing `hexa` (warm-seed:
#   `hexa cc --regen` regenerates the gitignored `self/native/hexa_cc.c` locally)
#   OR a shipped binary (`hx install hexa-lang`). A fresh-checkout SOURCE
#   bootstrap is therefore IMPOSSIBLE (no hexa on the runner, no committed seed),
#   and the warm CI path (download released/edge hexa binary then build) is not
#   wired here yet (the edge-tarball infra is currently RED — handoff 726b8b67).
#
#   Rather than leave Stage 0 referencing the deleted `hexa_cc_seed.c` (a
#   dead-ref that would fail every run), this workflow is converted to a
#   deliberate no-op. It reverses HEXA-CC-ZERO P3/P5/P6 (#2126 / #2134 / #2179 /
#   #2185), which are withdrawn as a scope change — NOT a regression.
#
# WARM-CI BLOCKER (HEXA-C-ZERO C1 — probed 2026-05-30, two upstream REDs)
#   The warm-install path (download released/edge `hexa` -> `hexa cc --regen`
#   -> build -> smoke) cannot go green on `ubuntu-latest` (x86_64) yet, for two
#   INDEPENDENT upstream reasons — neither fixable inside this workflow:
#     (1) edge release asset gap: the `edge` release currently holds ONLY
#         `hexa-linux-arm64.tar.gz`; `hexa-linux-x86_64.tar.gz` (and darwin-arm64)
#         are MISSING because `release.yml`'s x86_64 + darwin jobs are long-RED and
#         fail before the upload step. So a warm-install on an x86_64 runner has no
#         matching binary to fetch (handoff 726b8b67).
#     (2) `hexa cc --regen` is itself broken on clean main: a clean `install.sh`
#         cannot self-host the transpiler (merged `hexa_cc.c.new` has undeclared
#         symbols), so even with a binary the regen->build smoke would RED
#         (handoffs 16afa5bb / e311289a).
#   Verdict: `.verdicts/hexa-c-zero/C1-WARM-SEED-CI.txt`.
#
# RE-ENABLE PATH
#   When BOTH upstream REDs clear — (a) `release.yml` repopulates all 3 edge
#   tarballs on one main push, and (b) `hexa cc --regen` self-hosts cleanly from a
#   clean checkout — restore the matrix to: download the released hexa binary from
#   a green edge tarball, then `hexa cc --regen` + build + smoke, building FROM THAT
#   BINARY — never from a committed transpiler `.c`. Do NOT re-add `hexa_cc_seed.c`.

name: bootstrap

# Disabled: never triggers on push/pull_request (the old matrix required the
# removed cold-seed). Kept manually dispatchable only so the name + rationale
# survive in history. No automatic runs.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: bootstrap (DISABLED — cold-seed removed by user decision)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Explain
        shell: bash
        run: |
          echo "bootstrap is DISABLED (cold-seed removed by user decision 2026-05-30)."
          echo "The committed transpiler cold-seed self/native/hexa_cc_seed.c was"
          echo "removed — the repo has ZERO committed transpiler .c. A fresh-checkout"
          echo "SOURCE bootstrap is unsupported; CI must build from a released binary"
          echo "(hx install hexa-lang) once a clean warm path is wired. This reverses"
          echo "HEXA-CC-ZERO P3/P5/P6 (#2126 / #2134 / #2179 / #2185) as a scope change."
