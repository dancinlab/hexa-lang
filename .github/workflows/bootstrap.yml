# bootstrap.yml — 3-platform self-host bootstrap matrix (M5 last-mile)
#
# PURPOSE
#   anima roadmap M5 (self-hosted driver) 의 마지막 deliverable.
#   Linux CLI 실측 빌드 (build_hexa_cli_linux.hexa) 는 이미 통과해
#   508KB static ELF 가 build/hexa_linux 로 커밋돼 있다. 이 워크플로는
#   그 "already-working pipeline" 을 3-러너 매트릭스에서 재확인하며
#   macOS arm64, Linux x86_64 (optional Linux arm64) 에서 회귀를 막는다.
#
# INDEPENDENCE
#   raw-verify.yml 과 독립. 이 파일은 secrets 을 요구하지 않고 기본
#   GITHUB_TOKEN 만 사용하며, raw-verify 가 실패해도 bootstrap 은 돌고
#   vice versa. 두 워크플로는 서로 모른다.
#
# BOOTSTRAP CHAIN (per runner)
#   1. $CC self/native/hexa_cc.c -I self -o build/hexa_v2      (self-hosted transpiler binary)
#   2. build/hexa_v2 self/main.hexa build/stage1/main.c        (transpile CLI source)
#   3. $CC -I self build/stage1/main.c -o hexa                       (link CLI)
#   4. smoke — ./build/hexa_v2 + $CC 로 tiny 프로그램 실행
#
# RUNNERS
#   · macos-latest     — Apple Silicon arm64 (GA)
#   · ubuntu-latest    — x86_64 (GA)
#   · ubuntu-24.04-arm — arm64 (GA, main gate 에 포함).
#
# FLAGS NOTE
#   -Wno-trigraphs 필수 : hexa codegen 이 `??` byte 패턴을 C 문자열에
#   방출 (regex/pattern literal) — trigraph 경고/에러 회피.
#   -D_GNU_SOURCE + -std=gnu11 : runtime.c 가 popen/strdup/dlopen 등
#   GNU/POSIX extension 사용. Linux 에서 -ldl 필요 (macOS 는 libSystem 포함).

name: bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── macOS arm64 (Apple Silicon) ────────────────────────────
  bootstrap-macos:
    name: bootstrap (macos-arm64)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain info
        shell: bash
        run: |
          set -euo pipefail
          echo "uname : $(uname -a)"
          echo "cc    : $(clang --version | head -1)"
          echo "make  : $(make --version 2>&1 | head -1 || true)"

      - name: Stage 0 — compile self-hosted transpiler (hexa_v2)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p self/native build/stage1
          # runtime.c #include's runtime_core.c (line 1211), so a single
          # extra C input suffices to resolve the 66 undefined symbols
          # (hexa_int / hexa_str / hexa_array_new / __hexa_fn_arena_*).
          clang -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self self/native/hexa_cc.c self/runtime.c \
              -o build/hexa_v2
          file build/hexa_v2
          ls -la build/hexa_v2

      - name: Stage 1 — flatten + transpile self/main.hexa → build/stage1/main.c
        shell: bash
        run: |
          set -euo pipefail
          # self/main.hexa `use`s 7 compiler frontend modules (lexer / parser
          # / ast_to_hir / hir_to_mir / atlas / mir / nvptx_target) for the
          # in-process NVPTX emit driver. hexa_v2 is a single-file transpiler
          # — it does NOT resolve `use` — so main.hexa's closure must be
          # flattened by the compiled module_loader first, or the Stage 1
          # link fails on undefined lex / parse / lower / lower_hir /
          # codegen_emit_ptx_for_sm / static_atlas. module_loader.hexa itself
          # has zero `use` directives, so it transpiles single-TU.
          ./build/hexa_v2 self/module_loader.hexa build/stage1/module_loader.c
          clang -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self build/stage1/module_loader.c self/runtime.c \
              -o build/hexa_module_loader
          ./build/hexa_module_loader self/main.hexa build/stage1/main_expanded.hexa
          ./build/hexa_v2 build/stage1/main_expanded.hexa build/stage1/main.c
          wc -l build/stage1/main.c

      - name: Stage 1 — compile CLI driver (./hexa)
        shell: bash
        run: |
          set -euo pipefail
          clang -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self build/stage1/main.c self/runtime.c \
              -o hexa
          file hexa
          ls -la hexa

      - name: Smoke — hexa version + end-to-end transpile/compile/run
        shell: bash
        run: |
          set -euo pipefail
          ./hexa version || echo "(version subcmd may differ; dispatcher loaded)"
          mkdir -p /tmp/hexa_ci
          cat > /tmp/hexa_ci/hi.hexa <<'HEXA_EOF'
          fn main() {
              println("ok")
          }
          HEXA_EOF
          ./build/hexa_v2 /tmp/hexa_ci/hi.hexa /tmp/hexa_ci/hi.c
          clang -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self /tmp/hexa_ci/hi.c self/runtime.c -o /tmp/hexa_ci/hi
          OUT="$(/tmp/hexa_ci/hi)"
          echo "smoke output: $OUT"
          [[ "$OUT" == "ok" ]] || { echo "::error::smoke failed (got '$OUT')"; exit 1; }

      - name: stdlib ci-gate — run @ci_gate-marked stdlib tests (strict)
        shell: bash
        run: |
          set -euo pipefail
          # Closes the INBOX "stdlib *_test.hexa never run in CI" gap. Runs ONLY
          # the curated network-free subset opted in with a `// @ci_gate` marker
          # (the aggregator discovers 207 tests, most of which hit external APIs).
          # --ci-gate implies --strict → exit 1 on any FAIL/TIMEOUT/ERROR.
          export HEXA_BIN="$PWD/hexa"
          export HEXA_LANG="$PWD"
          export HEXA_MODULE_LOADER="$PWD/build/hexa_module_loader"
          export HEXA_MAC_BUILD_OK=1
          ./hexa tool/stdlib_selftest_aggregate.hexa --ci-gate

      - name: forge farr32 codegen smoke — hexa build --c-only → clang -fsyntax-only
        shell: bash
        run: |
          set -euo pipefail
          # INBOX #4: catch a Linux farr32 codegen regression (#1187 bare emit)
          # at the C level — no GPU, no link, no run. -Werror on implicit decls
          # is the exact gate (Mac silently accepted; Linux clang rejects). On
          # the Linux jobs this compiles the runtime.h `#else` branch that
          # all-Mac dev never exercises.
          export HEXA_LANG="$PWD"
          export HEXA_MAC_BUILD_OK=1
          ./hexa build tool/forge_farr32_codegen_smoke.hexa -o /tmp/farr32_smoke.c --c-only
          clang -fsyntax-only -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
            -Werror=implicit-function-declaration -I self /tmp/farr32_smoke.c
          echo "forge farr32 codegen smoke: OK"

      - name: Tail logs on failure
        if: failure()
        shell: bash
        run: |
          echo "── build/stage1 listing ──"
          ls -la build/stage1 2>&1 || true
          echo "── self/native listing ──"
          ls -la self/native 2>&1 || true
          echo "── last 80 lines of build/stage1/main.c ──"
          tail -80 build/stage1/main.c 2>&1 || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: hexa-macos-arm64
          path: |
            hexa
            build/hexa_v2
          if-no-files-found: error
          retention-days: 7

  # ── Linux x86_64 ───────────────────────────────────────────
  bootstrap-linux-x64:
    name: bootstrap (linux-x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
