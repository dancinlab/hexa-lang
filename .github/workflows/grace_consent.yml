# grace_consent.yml — CI gate for SPEC.yaml opt_out.ai_native_warn_policy
#
# PURPOSE
#   Enforce the per-site `Acked-grace: HXxxxx by <reviewer>` trailer on
#   every PR that introduces or modifies an `@grace(HXxxxx, ...)` site
#   in any `.hexa` source. Fails the PR if at least one site lacks a
#   matching trailer in the PR body or any of its commit messages.
#
#   Source contract: SPEC.yaml `opt_out.ai_native_warn_policy.user_consent_mechanism`
#   Driver: tool/check_grace_consent.hexa (`--pr <N>` mode preferred,
#           with a fallback to a base..HEAD diff if `gh` is unavailable).
#
# INVOCATION
#   Per-PR only. Push events are skipped — the trailer is a review-time
#   contract; commits landing on `main` directly are out of scope here.
#
# DEPENDENCIES
#   git, gh (preinstalled on GitHub-hosted runners), clang, and the
#   committed self-hosted transpiler `build/hexa_v2_linux` (x86_64 ELF).
#   We transpile tool/check_grace_consent.hexa → C and link against
#   self/runtime.c to produce a one-shot consent-checker binary. No
#   external installs. Mirrors bootstrap.yml Stage 0 (single-TU compile;
#   the script has zero `use` directives so no module_loader is needed).

name: grace-consent

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: check @grace consent trailers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # full history so HEAD..base diff is computable
          fetch-depth: 0

      - name: Build consent-checker binary (transpile + link)
        id: hexa
        shell: bash
        run: |
          set -euo pipefail
          # Make the committed transpiler executable (some checkout backends
          # drop the exec bit) and transpile the single-TU consent checker
          # to C, then link against the committed runtime.
          chmod +x build/hexa_v2_linux
          mkdir -p build/grace_consent
          ./build/hexa_v2_linux tool/check_grace_consent.hexa \
              build/grace_consent/check_grace_consent.c
          clang -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self \
              build/grace_consent/check_grace_consent.c self/runtime.c \
              -ldl -lpthread -lm \
              -o build/grace_consent/check_grace_consent
          file build/grace_consent/check_grace_consent
          echo "bin=build/grace_consent/check_grace_consent" >> "$GITHUB_OUTPUT"

      - name: Run consent checker (PR mode)
        if: ${{ github.event.pull_request != null }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.hexa.outputs.bin }}"
          echo "checker:     $BIN"
          echo "PR:          #${PR_NUMBER}"

          # The compiled binary is the same `tool/check_grace_consent.hexa`
          # entry point. Its argv parser starts at index 2 and its
          # _is_main() guard inspects argv[1] for `*/check_grace_consent.hexa`,
          # mirroring the original `hexa tool/check_grace_consent.hexa ...`
          # interpreter invocation. We preserve that contract by passing
          # `tool/check_grace_consent.hexa` as argv[1] when invoking the
          # compiled checker — purely a positional shim, never read as a
          # file path.
          SCRIPT_ARG=tool/check_grace_consent.hexa

          # Try --pr mode first (richest: covers PR body + every commit msg).
          # Fall back to the diff-range mode if `gh pr view` fails (e.g. on
          # a fork without token grants).
          if "$BIN" "$SCRIPT_ARG" --pr "$PR_NUMBER"; then
            echo "::notice::grace-consent OK (PR mode)"
            exit 0
          fi

          rc=$?
          if [ "$rc" -eq 2 ]; then
            # exit 2 = real consent violation (or hard usage error from
            # --pr).  If `gh` itself failed, the checker would have printed
            # a `gh pr view failed` message; in that case retry with
            # the local diff-range mode using GitHub's BASE_SHA.
            if "$BIN" "$SCRIPT_ARG" --pr "$PR_NUMBER" 2>&1 \
                | grep -q "gh pr view failed"; then
              echo "::warning::gh pr view unavailable; retrying with --diff"
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              "$BIN" "$SCRIPT_ARG" --diff "$BASE_SHA"
              exit $?
            fi
          fi
          exit "$rc"
