# grace_consent.yml — CI gate for SPEC.yaml opt_out.ai_native_warn_policy
#
# PURPOSE
#   Enforce the per-site `Acked-grace: HXxxxx by <reviewer>` trailer on
#   every PR that introduces or modifies an `@grace(HXxxxx, ...)` site
#   in any `.hexa` source. Fails the PR if at least one site lacks a
#   matching trailer in the PR body or any of its commit messages.
#
#   Source contract: SPEC.yaml `opt_out.ai_native_warn_policy.user_consent_mechanism`
#   Driver: tool/check_grace_consent.hexa (`--pr <N>` mode preferred,
#           with a fallback to a base..HEAD diff if `gh` is unavailable).
#
# INVOCATION
#   Per-PR only. Push events are skipped — the trailer is a review-time
#   contract; commits landing on `main` directly are out of scope here.
#
# DEPENDENCIES
#   git, gh (preinstalled on GitHub-hosted runners), gcc, and the in-tree
#   self-hosted hexa transpiler source. hexa is a COMPILED language (no
#   interpreter): the checker is transpiled (.hexa → C via self/native/
#   hexa_cc.c) then compiled to a standalone binary. The old
#   `build/hexa_interp.linux` expectation was wrong — that interpreter
#   binary never existed (hexa compiles, it does not interpret). No
#   external installs.

name: grace-consent

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: check @grace consent trailers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # full history so HEAD..base diff is computable
          fetch-depth: 0

      - name: Build consent checker (hexa is compiled — no interpreter)
        id: hexa
        shell: bash
        run: |
          set -euo pipefail
          # hexa is a COMPILED language: transpile .hexa → C via the
          # self-hosted hexa_cc, then cc to a standalone binary. There is
          # NO interpreter (the old build/hexa_interp.linux never existed).
          # Reuse the bootstrap Stage 0 transpiler build (runtime.c needs
          # -lm -ldl), then transpile + compile the consent checker.
          mkdir -p self/native build/grace
          gcc -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self self/native/hexa_cc.c self/runtime.c \
              -o self/native/hexa_v2 -lm -ldl
          ./self/native/hexa_v2 tool/check_grace_consent.hexa build/grace/cgc.c
          gcc -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self build/grace/cgc.c self/runtime.c \
              -o build/grace/check_grace_consent -lm -ldl
          echo "bin=build/grace/check_grace_consent" >> "$GITHUB_OUTPUT"

      - name: Run consent checker (PR mode)
        if: ${{ github.event.pull_request != null }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.hexa.outputs.bin }}"   # compiled checker binary
          echo "checker: $BIN"
          echo "PR:      #${PR_NUMBER}"

          # Try --pr mode first (richest: covers PR body + every commit msg).
          # Fall back to the diff-range mode if `gh pr view` fails (e.g. on
          # a fork without token grants).
          if "$BIN" --pr "$PR_NUMBER"; then
            echo "::notice::grace-consent OK (PR mode)"
            exit 0
          fi

          rc=$?
          if [ "$rc" -eq 2 ]; then
            # exit 2 = real consent violation (or hard usage error from
            # --pr).  If `gh` itself failed, the checker would have printed
            # a `gh pr view failed` message; in that case retry with
            # the local diff-range mode using GitHub's BASE_SHA.
            if "$BIN" --pr "$PR_NUMBER" 2>&1 \
                | grep -q "gh pr view failed"; then
              echo "::warning::gh pr view unavailable; retrying with --diff"
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              "$BIN" --diff "$BASE_SHA"
              exit $?
            fi
          fi
          exit "$rc"
