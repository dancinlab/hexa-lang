# atlas-consistency.yml — atlas representation drift gate.
#   FAILS if `hexa atlas export`'s live node count does not round-trip the
#   `hexa atlas stats` total node count (embedded.gen.hexa SSOT vs n6 export);
#   WARNS (non-fatal) if any by_kind/*.gen.hexa shard is older than
#   embedded.gen.hexa. Build steps mirror bootstrap.yml's linux-x86_64 job
#   verbatim (gcc -lm -ldl + module_loader flatten). One runner suffices —
#   atlas content is platform-independent.

name: atlas-consistency

on:
  push:
    paths:
      - 'compiler/atlas/**'
      - 'n6/**'
  pull_request:
    paths:
      - 'compiler/atlas/**'
      - 'n6/**'

permissions:
  contents: read

jobs:
  atlas-consistency:
    name: atlas consistency (embedded ↔ n6-export)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── build the hexa CLI (mirrors bootstrap.yml linux-x86_64 cold-seed) ──
      # Both `self/native/hexa_cc.c` and `self/runtime.c` left git in B9 (#2065 —
      # tracked `.c` = 0) and are absent on fresh checkout. Build from the
      # committed self-contained cold-seed `self/native/hexa_cc_seed.c` instead
      # (HEXA-CC-ZERO P3/P5/P6 — same pattern bootstrap.yml uses).
      - name: Stage 0 — cold-seed bootstrap (cc hexa_cc_seed.c → hexa_v2)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/stage1
          test -f self/native/hexa_cc_seed.c \
            || { echo "::error::self/native/hexa_cc_seed.c absent — cold-seed required"; exit 1; }
          # Self-contained TU: NO -I, NO amalgam sed, NO self/runtime.c.
          gcc -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              self/native/hexa_cc_seed.c -o build/hexa_v2 -lm -ldl
          file build/hexa_v2
          # Pure runtime object: the seed's runtime portion (through the
          # `/* amalgam END runtime.c */` marker) compiled alone — exports every
          # runtime symbol with NO transpiler symbols, so the transpiled CLI
          # main.c (which embeds its own lexer/parser/codegen) links against it
          # without multiple-definition clashes.
          sed '/\/\* amalgam END runtime.c \*\//q' self/native/hexa_cc_seed.c > build/stage1/runtime_pure.c
          gcc -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -c build/stage1/runtime_pure.c -o build/runtime_pure.o
          ls -la build/runtime_pure.o

      - name: Stage 1 — flatten + transpile + compile CLI (./hexa)
        shell: bash
        run: |
          set -euo pipefail
          export HEXA_LANG="$PWD"
          ./build/hexa_v2 self/module_loader.hexa build/stage1/module_loader.c
          gcc -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self build/stage1/module_loader.c build/runtime_pure.o \
              -o build/hexa_module_loader \
              -lm -ldl
          ./build/hexa_module_loader self/main.hexa build/stage1/main_expanded.hexa
          ./build/hexa_v2 build/stage1/main_expanded.hexa build/stage1/main.c
          gcc -O2 -std=gnu11 -D_GNU_SOURCE -Wno-trigraphs \
              -I self build/stage1/main.c build/runtime_pure.o \
              -o hexa \
              -lm -ldl
          file hexa

      # ── stage the cold tool-build seam ────────────────────────
      # `hexa atlas …` JIT-compiles tool/atlas_cli.hexa, and its internal build
      # needs the transpiler at build/hexat plus runtime sources at build/self/
      # (runtime.c + runtime.h). In a `.c=0` tree those `.c` files are absent;
      # synthesize build/self/runtime.c from the seed's runtime portion (the
      # same self-contained TU runtime_pure.o is compiled from) and copy the
      # tracked runtime.h. With these in place, `hexa atlas` builds + runs.
      - name: Stage tool-build seam (build/hexat + build/self/runtime.{c,h})
        shell: bash
        run: |
          set -euo pipefail
          cp build/hexa_v2 build/hexat
          mkdir -p build/self
          cp build/stage1/runtime_pure.c build/self/runtime.c
          cp self/runtime.h              build/self/runtime.h
          ls -la build/hexat build/self/runtime.c build/self/runtime.h

      # ── the gate ──────────────────────────────────────────────
      - name: Gate — embedded total == n6-export node count
        shell: bash
        run: |
          set -euo pipefail

          # (2) live SSOT count + hash from `hexa atlas stats`
          ./hexa atlas stats | tee /tmp/atlas_stats.txt
          EMB_COUNT="$(awk '/^total nodes/ {print $NF}'  /tmp/atlas_stats.txt)"
          ATLAS_HASH="$(awk '/^ATLAS_HASH/  {print $NF}'  /tmp/atlas_stats.txt)"

          # (3) export the live atlas, then count nodes two ways:
          #     · the CLI's self-reported "wrote N nodes"
          #     · independent @-header sigil count of the written file
          ./hexa atlas export --out /tmp/live.n6 | tee /tmp/atlas_export.txt
          EXPORT_REPORTED="$(awk '{for(i=1;i<=NF;i++) if($i=="wrote"){print $(i+1); exit}}' /tmp/atlas_export.txt)"
          N6_COUNT="$(grep -cE '^@[A-Z]' /tmp/live.n6 || true)"

          echo "════════════════════════════════════════════"
          echo "ATLAS_HASH       : ${ATLAS_HASH}"
          echo "EMB_COUNT        : ${EMB_COUNT}   (hexa atlas stats · total nodes)"
          echo "EXPORT_REPORTED  : ${EXPORT_REPORTED}   (hexa atlas export · wrote N)"
          echo "N6_COUNT         : ${N6_COUNT}   (@-header sigils in /tmp/live.n6)"
          echo "════════════════════════════════════════════"

          # (4) FAIL if export does not round-trip the live SSOT count
          if [[ "${EMB_COUNT}" != "${N6_COUNT}" ]]; then
            echo "::error::atlas drift: EMB_COUNT=${EMB_COUNT} != N6_COUNT=${N6_COUNT} (export must round-trip the live node count)"
            exit 1
          fi
          if [[ "${EMB_COUNT}" != "${EXPORT_REPORTED}" ]]; then
            echo "::error::atlas drift: stats total=${EMB_COUNT} != export-reported=${EXPORT_REPORTED}"
            exit 1
          fi
          echo "✓ round-trip OK: ${EMB_COUNT} nodes (embedded == n6 export)"

      # ── staleness signal (WARN only, never fails) ─────────────
      - name: Warn — by_kind shards older than embedded.gen.hexa
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          EMB="compiler/atlas/embedded.gen.hexa"
          [[ -f "$EMB" ]] || { echo "(no $EMB — skipping staleness check)"; exit 0; }
          stale=0
          for shard in compiler/atlas/by_kind/*.gen.hexa; do
            [[ -e "$shard" ]] || continue
            if [[ "$shard" -ot "$EMB" ]]; then
              echo "::warning file=${shard}::stale: ${shard} is older than ${EMB} (atlas shard may be behind the SSOT)"
              stale=$((stale + 1))
            fi
          done
          if [[ "$stale" -gt 0 ]]; then
            echo "⚠ ${stale} by_kind shard(s) older than embedded.gen.hexa (warning only)"
          else
            echo "✓ no by_kind shards older than embedded.gen.hexa"
          fi
